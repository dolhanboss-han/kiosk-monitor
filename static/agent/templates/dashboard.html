<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Kiosk Agent</title>
<style>body{background:#0a0e1a;color:#c8d6e5;font-family:sans-serif;padding:20px}
.kpi{display:flex;gap:20px;margin-bottom:20px}.k{background:#111827;padding:15px 25px;border-radius:8px;text-align:center}
.k .v{font-size:2rem;font-weight:700;color:#4fc3f7}.k .l{font-size:0.8rem;color:#556}
table{width:100%;border-collapse:collapse;font-size:0.85rem}th,td{padding:6px 10px;border-bottom:1px solid#1a2340;text-align:left}
th{color:#4fc3f7}.st{padding:2px 8px;border-radius:10px;font-size:0.75rem}
.st-START{background:#4fc3f722;color:#4fc3f7}.st-END{background:#8b5cf622;color:#8b5cf6}.st-CHANGE{background:#f59e0b22;color:#f59e0b}</style></head>
<body><h1>Kiosk Agent Monitor</h1><div class="kpi"><div class="k"><div class="v" id="total">-</div><div class="l">오늘 이벤트</div></div>
<div class="k"><div class="v" id="starts">-</div><div class="l">진입</div></div>
<div class="k"><div class="v" id="ends">-</div><div class="l">종료</div></div></div>
<table><thead><tr><th>시각</th><th>상태</th><th>프로세스</th><th>타이틀</th><th>소요</th></tr></thead><tbody id="tb"></tbody></table>
<script>
async function load(){
    var r=await fetch('/api/status');var d=await r.json();
    document.getElementById('total').textContent=d.summary.total;
    document.getElementById('starts').textContent=d.summary.starts;
    document.getElementById('ends').textContent=d.summary.ends;
    var h='';(d.events||[]).forEach(function(e){
        h+='<tr><td>'+(e.timestamp||'').substring(11,19)+'</td><td><span class="st st-'+e.status+'">'+e.status+'</span></td><td>'+e.proc_name+'</td><td>'+e.window_title+'</td><td>'+(e.elapsed_sec?e.elapsed_sec+'s':'')+'</td></tr>';
    });document.getElementById('tb').innerHTML=h;
}
load();setInterval(load,5000);
</script></body></html>
