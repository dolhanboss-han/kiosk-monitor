<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - BSEYE Kiosk Monitor</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#eee;display:flex;justify-content:center;align-items:center;height:100vh;}
        .login-box{background:#1a1a2e;border:1px solid #333;border-radius:16px;padding:40px;width:400px;text-align:center;}
        .login-box h1{color:#00d4ff;font-size:1.8rem;margin-bottom:5px;}
        .login-box p{color:#888;font-size:0.9rem;margin-bottom:30px;}
        .form-group{margin-bottom:20px;text-align:left;}
        .form-group label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:6px;}
        .form-group input{width:100%;padding:12px 15px;background:#252540;border:1px solid #333;border-radius:8px;color:#eee;font-size:1rem;outline:none;}
        .form-group input:focus{border-color:#00d4ff;}
        .login-btn{width:100%;padding:14px;background:#00d4ff;color:#0f0f1a;border:none;border-radius:8px;font-size:1.1rem;font-weight:bold;cursor:pointer;margin-top:10px;}
        .login-btn:hover{background:#00b8e6;}
        .error{background:#ff444422;color:#ff4444;padding:10px;border-radius:6px;margin-bottom:20px;font-size:0.9rem;}
        .footer{margin-top:25px;color:#555;font-size:0.8rem;}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>BSEYE</h1>
        <p>Kiosk Integrated Monitoring System</p>
        
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="username" placeholder="아이디 입력" required autofocus>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호 입력" required>
            </div>
            <button type="submit" class="login-btn">로그인</button>
        </form>
        
        <div class="footer">BlueSwell &copy; 2026</div>
    </div>
</body>
</html>
