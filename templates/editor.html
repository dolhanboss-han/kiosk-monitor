<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSEYE Dashboard Editor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#eee;font-family:'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden}

/* 팔레트 */
#palette{width:260px;background:#12122a;border-right:1px solid #333;display:flex;flex-direction:column;overflow:hidden}
#palette-header{padding:12px;border-bottom:1px solid #333}
#palette-header h2{font-size:0.95rem;color:#00d4ff;margin-bottom:8px}
#palette-search{width:100%;padding:6px 10px;background:#1a1a3e;border:1px solid #444;border-radius:6px;color:#eee;font-size:0.8rem}
#palette-search:focus{border-color:#00d4ff;outline:none}
.cat-tabs{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.cat-tab{padding:3px 8px;border-radius:4px;font-size:0.65rem;cursor:pointer;border:1px solid #444;color:#888;background:transparent}
.cat-tab:hover,.cat-tab.active{border-color:#00d4ff;color:#00d4ff;background:#00d4ff11}
#palette-list{flex:1;overflow-y:auto;padding:8px}
#palette-list::-webkit-scrollbar{width:4px}
#palette-list::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.widget-item{background:#1a1a3e;border:1px solid #333;border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:grab;transition:0.2s}
.widget-item:hover{border-color:#00d4ff;background:#222250}
.widget-item .wi-name{font-size:0.8rem;font-weight:bold;color:#fff}
.widget-item .wi-desc{font-size:0.65rem;color:#666;margin-top:2px}
.widget-item .wi-cat{font-size:0.55rem;color:#00d4ff;background:#00d4ff15;padding:1px 5px;border-radius:3px;display:inline-block;margin-top:3px}
#add-widget-btn{margin:8px;padding:8px;background:#1a1a3e;border:1px dashed #555;border-radius:6px;color:#888;font-size:0.8rem;cursor:pointer;text-align:center}
#add-widget-btn:hover{border-color:#00d4ff;color:#00d4ff}

/* 툴바 */
#toolbar{position:fixed;top:0;left:260px;right:0;height:44px;background:#12122a;border-bottom:1px solid #333;display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100}
#toolbar button{background:#1a1a3e;color:#ccc;border:1px solid #444;border-radius:5px;padding:5px 12px;cursor:pointer;font-size:0.8rem}
#toolbar button:hover{border-color:#00d4ff;color:#00d4ff}
.btn-save{background:#00d4ff!important;color:#000!important;border-color:#00d4ff!important;font-weight:bold}
.btn-preview{background:#00ff88!important;color:#000!important;border-color:#00ff88!important;font-weight:bold}
#toolbar a{color:#888;text-decoration:none;font-size:0.8rem;margin-left:auto}
#toolbar a:hover{color:#00d4ff}

/* 캔버스 */
#canvas-wrap{flex:1;margin-left:260px;margin-top:44px;overflow:auto;position:relative}
#canvas{width:1400px;min-height:calc(100vh - 44px);position:relative;margin:0;background:#0f0f2a;border:1px dashed #222;border-radius:8px}

/* 위젯 */
.widget{position:absolute;background:#1a1a3e;border:2px solid #333;border-radius:8px;cursor:move;overflow:hidden}
.widget.selected{border-color:#a855f7;box-shadow:0 0 10px #a855f755}
.widget.multi-selected{border-color:#00d4ff;box-shadow:0 0 10px #00d4ff55}
.widget .w-header{background:#222250;padding:3px 8px;font-size:0.65rem;color:#888;display:flex;justify-content:space-between;align-items:center;cursor:move}
.widget .w-header .w-del{cursor:pointer;color:#f66;font-size:0.85rem;padding:0 4px}
.widget .w-header .w-del:hover{color:#ff0000}
.widget .w-body{padding:4px 6px;font-size:0.75rem;color:#ccc;overflow:auto;height:calc(100% - 24px)}
.widget .w-body::-webkit-scrollbar{width:3px}
.widget .w-body::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.widget .w-resize{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 50%,#444 50%)}

/* KPI */
.kpi-val{font-size:1.6rem;font-weight:bold;color:#00d4ff;text-align:center;margin:6px 0}
.kpi-label{text-align:center;color:#888;font-size:0.65rem}
.kpi-val.green{color:#00ff88}.kpi-val.red{color:#ff4444}.kpi-val.yellow{color:#ffaa00}

/* 테이블 */
.w-body table{width:100%;border-collapse:collapse}
.w-body th{text-align:left;color:#888;font-size:0.6rem;padding:1px 3px;border-bottom:1px solid #333}
.w-body td{font-size:0.65rem;padding:1px 3px;border-bottom:1px solid #1a1a2e}
.w-body td a{color:#00d4ff;text-decoration:none}

/* 뱃지 */
.mini-badge{padding:1px 4px;border-radius:3px;font-size:0.55rem;font-weight:bold}
.mini-badge.ok,.mini-badge.online,.mini-badge.resolved{background:#00ff8822;color:#00ff88}
.mini-badge.error,.mini-badge.critical,.mini-badge.open{background:#ff444422;color:#ff4444}
.mini-badge.warning,.mini-badge.in_progress,.mini-badge.acknowledged{background:#ffaa0022;color:#ffaa00}

/* 그룹박스 */
#group-box{position:absolute;border:2px dashed #00d4ff;border-radius:4px;pointer-events:auto;cursor:move;z-index:50}

/* 마키 */
.marquee{position:absolute;border:1px dashed #00d4ff;background:#00d4ff11;z-index:60;pointer-events:none}

/* 모달 */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:#000a;z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#12122a;border:1px solid #333;border-radius:10px;padding:24px;width:400px}
.modal h3{color:#00d4ff;margin-bottom:16px;font-size:1rem}
.modal label{display:block;color:#888;font-size:0.75rem;margin-top:10px}
.modal input,.modal select{width:100%;padding:6px 10px;background:#1a1a3e;border:1px solid #444;border-radius:5px;color:#eee;font-size:0.8rem;margin-top:4px}
.modal input:focus,.modal select:focus{border-color:#00d4ff;outline:none}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1;padding:8px;border-radius:5px;cursor:pointer;font-size:0.85rem;border:none}
.modal-btns .btn-ok{background:#00d4ff;color:#000;font-weight:bold}
.modal-btns .btn-cancel{background:#333;color:#ccc}

#msg{position:fixed;top:50px;right:16px;background:#00ff88;color:#000;padding:6px 14px;border-radius:6px;font-size:0.8rem;display:none;z-index:300}
</style>
</head>
<body>

<div id="palette">
<div id="palette-header">
<h2>위젯 팔레트</h2>
<input type="text" id="palette-search" placeholder="위젯 검색..." oninput="filterWidgets()">
<div class="cat-tabs" id="cat-tabs"></div>
</div>
<div id="palette-list"></div>
<div id="add-widget-btn" onclick="showAddModal()">+ 커스텀 위젯 추가</div>
</div>

<div id="toolbar">
<button onclick="saveLayout()" class="btn-save">저장</button>
<button onclick="previewLayout()" class="btn-preview">미리보기</button>
<button onclick="clearCanvas()">추천 레이아웃</button>
<button onclick="selectAll()">전체선택</button>
<button onclick="snapToGrid=!snapToGrid;this.style.borderColor=snapToGrid?'#00d4ff':'#444'">그리드</button>
<a href="/">← 대시보드</a>
</div>

<div id="canvas-wrap">
<div id="canvas" id="canvas"></div>
</div>

<div id="msg"></div>

<script>
const canvas = document.getElementById('canvas');
let widgets = [];
let widgetId = 0;
let snapToGrid = true;
const GRID = 20;
let dragWidget = null, dragOffX = 0, dragOffY = 0;
let resizeWidget = null, resizeStartX = 0, resizeStartY = 0, resizeStartW = 0, resizeStartH = 0;
let selectedWidgets = new Set();
let marquee = null, marqueeStart = null, isMarquee = false;
let groupBox = null, groupDrag = null, groupResize = null;
let WIDGET_DEFS = {};
let ALL_WIDGETS = [];
let currentCat = 'all';

// 서버에서 위젯 목록 로드

function showToast(msg) {
    let t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#00d4ff;color:#000;padding:10px 24px;border-radius:8px;font-size:0.85rem;font-weight:bold;z-index:9999;transition:opacity 0.5s';
    document.body.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';},2000);
    setTimeout(()=>{t.remove();},2500);
}

async function loadWidgetDefs() {
    const res = await fetch('/api/widgets');
    const d = await res.json();
    ALL_WIDGETS = d.widgets;
    WIDGET_DEFS = {};
    const cats = new Set(['all']);
    d.widgets.forEach(w => {
        WIDGET_DEFS[w.key] = {w: w.w, h: w.h, label: w.name, source: w.source, category: w.category};
        cats.add(w.category);
    });
    renderCatTabs([...cats]);
    renderPalette();
}

function renderCatTabs(cats) {
    const el = document.getElementById('cat-tabs');
    el.innerHTML = cats.map(c => '<div class="cat-tab' + (c===currentCat?' active':'') + '" onclick="filterByCat(\'' + c + '\')">' + (c==='all'?'전체':c) + '</div>').join('');
}

function filterByCat(cat) {
    currentCat = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.textContent===(cat==='all'?'전체':cat)));
    renderPalette();
}

function filterWidgets() {
    renderPalette();
}

function renderPalette() {
    const search = document.getElementById('palette-search').value.toLowerCase();
    const list = document.getElementById('palette-list');
    let filtered = ALL_WIDGETS.filter(w => {
        if (currentCat !== 'all' && w.category !== currentCat) return false;
        if (search && !w.name.toLowerCase().includes(search) && !w.desc.toLowerCase().includes(search)) return false;
        return true;
    });
    list.innerHTML = filtered.map(w => '<div class="widget-item" draggable="true" data-type="' + w.key + '"><div class="wi-name">' + w.name + '</div><div class="wi-desc">' + (w.desc||'') + '</div><div class="wi-cat">' + w.category + '</div></div>').join('');
    list.querySelectorAll('.widget-item').forEach(item => {
        item.addEventListener('dragstart', e => e.dataTransfer.setData('widget-type', item.dataset.type));
    });
}

canvas.addEventListener('dragover', e => e.preventDefault());
canvas.addEventListener('drop', e => {
    e.preventDefault();
    const type = e.dataTransfer.getData('widget-type');
    if (!type) return;
    const rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left, y = e.clientY - rect.top;
    if (snapToGrid) { x = Math.round(x/GRID)*GRID; y = Math.round(y/GRID)*GRID; }
    addWidget(type, x, y);
});

function addWidget(type, x, y, w, h, extra) {
    const def = WIDGET_DEFS[type] || {w:200,h:120,label:type};
    const id = 'w_' + (++widgetId);
    const ww = w || def.w, hh = h || def.h;
    const el = document.createElement('div');
    el.className = 'widget'; el.id = id;
    el.style.cssText = 'left:'+x+'px;top:'+y+'px;width:'+ww+'px;height:'+hh+'px';
    el.dataset.type = type;
    el.innerHTML = '<div class="w-header"><span>'+def.label+'</span><span class="w-del" onclick="removeWidget(\''+id+'\')">&times;</span></div><div class="w-body" id="body_'+id+'">로딩중...</div><div class="w-resize"></div>';

    el.querySelector('.w-header').addEventListener('mousedown', e => {
        if (e.target.classList.contains('w-del')) return;
        if (!selectedWidgets.has(el) && !e.ctrlKey) clearSelection();
        dragWidget = el; const r = el.getBoundingClientRect();
        dragOffX = e.clientX - r.left; dragOffY = e.clientY - r.top;
        if (!e.ctrlKey && selectedWidgets.size <= 1) { clearSelection(); el.classList.add('selected'); }
        e.preventDefault();
    });

    el.querySelector('.w-resize').addEventListener('mousedown', e => {
        resizeWidget = el; resizeStartX = e.clientX; resizeStartY = e.clientY;
        resizeStartW = el.offsetWidth; resizeStartH = el.offsetHeight;
        e.preventDefault(); e.stopPropagation();
    });

    if (type === 'text_block') {
        const body = el.querySelector('.w-body');
        body.contentEditable = true;
        body.textContent = extra || '텍스트를 입력하세요';
    }

    canvas.appendChild(el);
    widgets.push({id, type, x, y, w: ww, h: hh, extra: extra || ''});
    loadWidgetData(id, type);
}

function removeWidget(id) {
    document.getElementById(id)?.remove();
    widgets = widgets.filter(w => w.id !== id);
    selectedWidgets.forEach(w => { if (w.id === id) selectedWidgets.delete(w); });
    updateGroupBox();
}

function clearCanvas() {
    if(!confirm('현재 배치를 초기화하고 추천 레이아웃을 불러올까요?')) return;
    document.querySelectorAll('.widget').forEach(w=>w.remove());
    selectedWidgets.clear();
    const defaultLayout = [
        {"id":"w_1","type":"clock","x":10,"y":10,"w":160,"h":100},
        {"id":"w_2","type":"kpi_total_hosp","x":180,"y":10,"w":160,"h":100},
        {"id":"w_3","type":"kpi_active_hosp","x":350,"y":10,"w":160,"h":100},
        {"id":"w_4","type":"kpi_total_kiosk","x":520,"y":10,"w":160,"h":100},
        {"id":"w_5","type":"kpi_today_count","x":690,"y":10,"w":160,"h":100},
        {"id":"w_6","type":"kpi_today_hosp","x":860,"y":10,"w":160,"h":100},
        {"id":"w_7","type":"kpi_today_kiosk","x":1030,"y":10,"w":160,"h":100},
        {"id":"w_8","type":"kpi_total_agent","x":10,"y":120,"w":150,"h":100},
        {"id":"w_9","type":"kpi_online_agent","x":170,"y":120,"w":150,"h":100},
        {"id":"w_10","type":"kpi_error_agent","x":330,"y":120,"w":150,"h":100},
        {"id":"w_11","type":"kpi_offline_agent","x":490,"y":120,"w":150,"h":100},
        {"id":"w_12","type":"kpi_open_alarms","x":650,"y":120,"w":150,"h":100},
        {"id":"w_13","type":"kpi_open_tickets","x":810,"y":120,"w":150,"h":100},
        {"id":"w_14","type":"kpi_today_alarm","x":970,"y":120,"w":150,"h":100},
        {"id":"w_15","type":"kpi_month_count","x":1130,"y":120,"w":150,"h":100},
        {"id":"w_16","type":"weekly_chart","x":10,"y":230,"w":420,"h":260},
        {"id":"w_17","type":"chart_monthly","x":440,"y":230,"w":420,"h":260},
        {"id":"w_18","type":"isv_chart","x":870,"y":230,"w":410,"h":260},
        {"id":"w_19","type":"chart_hourly","x":10,"y":500,"w":420,"h":260},
        {"id":"w_20","type":"chart_isv_today","x":440,"y":500,"w":420,"h":260},
        {"id":"w_21","type":"kpi_avg_response","x":870,"y":500,"w":160,"h":100},
        {"id":"w_22","type":"isv_list","x":10,"y":770,"w":420,"h":240},
        {"id":"w_23","type":"recent_usage","x":440,"y":770,"w":420,"h":240},
        {"id":"w_24","type":"table_top10_today","x":870,"y":770,"w":410,"h":240},
        {"id":"w_25","type":"alarm_list","x":10,"y":1020,"w":420,"h":240},
        {"id":"w_26","type":"ticket_list","x":440,"y":1020,"w":420,"h":240},
        {"id":"w_27","type":"agent_status","x":870,"y":1020,"w":410,"h":240},
        {"id":"w_28","type":"table_error_kiosks","x":10,"y":1270,"w":420,"h":220},
        {"id":"w_29","type":"table_no_heartbeat","x":440,"y":1270,"w":420,"h":220},
        {"id":"w_30","type":"text_block","x":870,"y":1270,"w":410,"h":220}
    ];
    defaultLayout.forEach(w => {
        addWidget(w.type, w.x, w.y, w.w, w.h);
    });
    alert('추천 레이아웃이 로드되었습니다. 저장 버튼을 눌러 적용하세요.');
}

// 마우스 이벤트
document.addEventListener('mousemove', e => {
    if (dragWidget) {
        const rect = canvas.getBoundingClientRect();
        let x = e.clientX - rect.left - dragOffX, y = e.clientY - rect.top - dragOffY;
        if (snapToGrid) { x = Math.round(x/GRID)*GRID; y = Math.round(y/GRID)*GRID; }
        x = Math.max(0,x); y = Math.max(0,y);
        dragWidget.style.left = x+'px'; dragWidget.style.top = y+'px';
        const wd = widgets.find(w => w.id === dragWidget.id);
        if (wd) { wd.x = x; wd.y = y; }
    }
    if (resizeWidget) {
        let nw = resizeStartW + (e.clientX - resizeStartX), nh = resizeStartH + (e.clientY - resizeStartY);
        if (snapToGrid) { nw = Math.round(nw/GRID)*GRID; nh = Math.round(nh/GRID)*GRID; }
        nw = Math.max(80,nw); nh = Math.max(50,nh);
        resizeWidget.style.width = nw+'px'; resizeWidget.style.height = nh+'px';
        applyFontScale(resizeWidget, nw, nh);
        const wd = widgets.find(w => w.id === resizeWidget.id);
        if (wd) { wd.w = nw; wd.h = nh; }
    }
    if (isMarquee && marquee) {
        const rect = canvas.getBoundingClientRect();
        const cx = e.clientX-rect.left, cy = e.clientY-rect.top;
        marquee.style.left = Math.min(marqueeStart.x,cx)+'px';
        marquee.style.top = Math.min(marqueeStart.y,cy)+'px';
        marquee.style.width = Math.abs(cx-marqueeStart.x)+'px';
        marquee.style.height = Math.abs(cy-marqueeStart.y)+'px';
    }
    if (groupDrag) {
        const dx = e.clientX-groupDrag.startX, dy = e.clientY-groupDrag.startY;
        groupDrag.offsets.forEach(o => {
            let nx=o.origX+dx, ny=o.origY+dy;
            if (snapToGrid){nx=Math.round(nx/GRID)*GRID;ny=Math.round(ny/GRID)*GRID;}
            o.el.style.left=nx+'px';o.el.style.top=ny+'px';
            const wd=widgets.find(w=>w.id===o.el.id);if(wd){wd.x=nx;wd.y=ny;}
        });
        if(groupBox){groupBox.style.left=(groupDrag.boxX+dx)+'px';groupBox.style.top=(groupDrag.boxY+dy)+'px';}
    }
    if (groupResize) {
        const nw=Math.max(100,groupResize.startW+(e.clientX-groupResize.startX));
        const nh=Math.max(80,groupResize.startH+(e.clientY-groupResize.startY));
        const gx=parseInt(groupBox.style.left),gy=parseInt(groupBox.style.top);
        groupBox.style.width=nw+'px';groupBox.style.height=nh+'px';
        groupResize.widgets.forEach(wr=>{
            const wx=gx+wr.relX*nw,wy=gy+wr.relY*nh,ww=Math.max(80,wr.relW*nw),wh=Math.max(50,wr.relH*nh);
            wr.el.style.left=Math.round(wx)+'px';wr.el.style.top=Math.round(wy)+'px';
            wr.el.style.width=Math.round(ww)+'px';wr.el.style.height=Math.round(wh)+'px';
            applyFontScale(wr.el,Math.round(ww),Math.round(wh));
            const wd=widgets.find(w=>w.id===wr.el.id);if(wd){wd.x=Math.round(wx);wd.y=Math.round(wy);wd.w=Math.round(ww);wd.h=Math.round(wh);}
        });
    }
});

document.addEventListener('mouseup', e => {
    if (dragWidget) { dragWidget.classList.remove('selected'); dragWidget = null; }
    resizeWidget = null;
    if (isMarquee && marquee) {
        const mx=parseInt(marquee.style.left),my=parseInt(marquee.style.top),mw=parseInt(marquee.style.width||0),mh=parseInt(marquee.style.height||0);
        if (mw>5&&mh>5) {
            canvas.querySelectorAll('.widget').forEach(w=>{
                const wx=parseInt(w.style.left),wy=parseInt(w.style.top);
                if(wx<mx+mw&&wx+w.offsetWidth>mx&&wy<my+mh&&wy+w.offsetHeight>my){
                    selectedWidgets.add(w);w.classList.add('multi-selected');
                }
            });
            updateGroupBox();
        }
        marquee.remove();marquee=null;isMarquee=false;
    }
    groupDrag=null;groupResize=null;
});

canvas.addEventListener('mousedown', e => {
    if (e.target===canvas) {
        if(!e.ctrlKey) clearSelection();
        const rect=canvas.getBoundingClientRect();
        marqueeStart={x:e.clientX-rect.left,y:e.clientY-rect.top};
        marquee=document.createElement('div');marquee.className='marquee';
        marquee.style.left=marqueeStart.x+'px';marquee.style.top=marqueeStart.y+'px';
        canvas.appendChild(marquee);isMarquee=true;
    }
});

canvas.addEventListener('click', e => {
    const w=e.target.closest('.widget');
    if(w&&!e.target.classList.contains('w-del')&&!e.target.classList.contains('w-resize')){
        toggleSelect(w,e.ctrlKey);
    }
});

function toggleSelect(el,additive){
    if(additive){
        if(selectedWidgets.has(el)){selectedWidgets.delete(el);el.classList.remove('multi-selected');}
        else{selectedWidgets.add(el);el.classList.add('multi-selected');}
    }else{clearSelection();selectedWidgets.add(el);el.classList.add('selected');}
    updateGroupBox();
}
function clearSelection(){
    selectedWidgets.forEach(w=>{w.classList.remove('selected','multi-selected');});
    selectedWidgets.clear();removeGroupBox();
}
function selectAll(){
    clearSelection();
    canvas.querySelectorAll('.widget').forEach(w=>{selectedWidgets.add(w);w.classList.add('multi-selected');});
    updateGroupBox();
}
function removeGroupBox(){if(groupBox){groupBox.remove();groupBox=null;}}
function updateGroupBox(){
    removeGroupBox();if(selectedWidgets.size<2)return;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    selectedWidgets.forEach(w=>{const x=parseInt(w.style.left),y=parseInt(w.style.top);if(x<minX)minX=x;if(y<minY)minY=y;if(x+w.offsetWidth>maxX)maxX=x+w.offsetWidth;if(y+w.offsetHeight>maxY)maxY=y+w.offsetHeight;});
    groupBox=document.createElement('div');groupBox.id='group-box';
    groupBox.style.cssText='left:'+(minX-4)+'px;top:'+(minY-4)+'px;width:'+(maxX-minX+8)+'px;height:'+(maxY-minY+8)+'px';
    const handle=document.createElement('div');
    handle.style.cssText='position:absolute;bottom:-4px;right:-4px;width:10px;height:10px;background:#00d4ff;border-radius:2px;cursor:nwse-resize';
    handle.addEventListener('mousedown',e=>{
        e.stopPropagation();
        groupResize={startX:e.clientX,startY:e.clientY,startW:parseInt(groupBox.style.width),startH:parseInt(groupBox.style.height),widgets:[]};
        const gx=parseInt(groupBox.style.left),gy=parseInt(groupBox.style.top),gw=parseInt(groupBox.style.width),gh=parseInt(groupBox.style.height);
        selectedWidgets.forEach(w=>{groupResize.widgets.push({el:w,relX:(parseInt(w.style.left)-gx)/gw,relY:(parseInt(w.style.top)-gy)/gh,relW:w.offsetWidth/gw,relH:w.offsetHeight/gh});});
    });
    groupBox.appendChild(handle);
    groupBox.addEventListener('mousedown',e=>{
        if(e.target===handle)return;
        groupDrag={startX:e.clientX,startY:e.clientY,offsets:[],boxX:parseInt(groupBox.style.left),boxY:parseInt(groupBox.style.top)};
        selectedWidgets.forEach(w=>{groupDrag.offsets.push({el:w,origX:parseInt(w.style.left),origY:parseInt(w.style.top)});});
        e.preventDefault();
    });
    canvas.appendChild(groupBox);
}

document.addEventListener('keydown', e => {
    if(e.ctrlKey&&e.key==='a'){e.preventDefault();selectAll();}
    if((e.key==='Delete'||e.key==='Backspace')&&selectedWidgets.size>0&&document.activeElement.contentEditable!=='true'){
        selectedWidgets.forEach(w=>{widgets=widgets.filter(wd=>wd.id!==w.id);w.remove();});clearSelection();
    }
    if(e.key==='Escape')clearSelection();
});

// 폰트 스케일
function applyFontScale(el,w,h){
    const type=el.dataset.type;const def=WIDGET_DEFS[type];if(!def)return;
    const scale=Math.min(w/def.w,h/def.h);
    const body=el.querySelector('.w-body');if(!body)return;
    const kv=body.querySelector('.kpi-val'),kl=body.querySelector('.kpi-label');
    if(kv){kv.style.fontSize=Math.max(0.8,1.6*scale)+'rem';}
    if(kl){kl.style.fontSize=Math.max(0.45,0.65*scale)+'rem';}
    const tbl=body.querySelector('table');
    if(tbl){const ts=Math.min(w/(def.w||200),h/(def.h||200));
        tbl.querySelectorAll('th').forEach(t=>{t.style.fontSize=Math.max(0.4,0.6*ts)+'rem';t.style.padding=Math.max(0,1*ts)+'px '+Math.max(1,2*ts)+'px';});
        tbl.querySelectorAll('td').forEach(t=>{t.style.fontSize=Math.max(0.45,0.65*ts)+'rem';t.style.padding=Math.max(0,1*ts)+'px '+Math.max(1,2*ts)+'px';});
    }
    const hdr=el.querySelector('.w-header');
    if(hdr){hdr.style.fontSize=Math.max(0.45,0.65*scale)+'rem';}
}

// 저장/불러오기
async function saveLayout(saveAs) {
    const widgets = document.querySelectorAll('#canvas .widget');
    const layout = [];
    widgets.forEach(w => {
        layout.push({
            id: w.id,
            type: w.getAttribute('data-type') || '',
            x: parseInt(w.style.left) || 0,
            y: parseInt(w.style.top) || 0,
            w: parseInt(w.style.width) || 160,
            h: parseInt(w.style.height) || 100,
            extra: w.getAttribute('data-extra') || ''
        });
    });
    const body = {layout: layout, save_as: saveAs || 'personal'};
    if(saveAs === 'role_default') {
        body.target_role = document.getElementById('roleSelect').value;
    }
    fetch('/api/layout', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    }).then(r => r.json()).then(d => {
        if(d.status === 'ok' || d.status === 'saved') {
            const msg = saveAs === 'role_default' ? '역할별 기본 레이아웃 저장 완료!' : '내 레이아웃 저장 완료!';
            showToast(msg);
        }
    });
}
async function loadLayout(){
    const res=await fetch('/api/layout');const d=await res.json();
    if(d.layout&&d.layout.length>0)d.layout.forEach(w=>addWidget(w.type,w.x,w.y,w.w,w.h,w.extra));
}

async function submitCustomWidget(){
    const name=document.getElementById('cw-name').value.trim();
    if(!name){alert('이름을 입력하세요');return;}
    const key='custom_'+name.replace(/\s/g,'_').toLowerCase()+'_'+Date.now();
    const data={key:key,name:name,category:document.getElementById('cw-cat').value,desc:document.getElementById('cw-desc').value,w:parseInt(document.getElementById('cw-w').value)||200,h:parseInt(document.getElementById('cw-h').value)||120,source:'none'};
    const res=await fetch('/api/widgets/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const d=await res.json();
    if(d.status==='ok'){document.getElementById('add-modal').remove();await loadWidgetDefs();showMsg('위젯 추가 완료!');}
    else{alert('추가 실패: '+(d.error||''));}
}

// 초기 로드
loadWidgetDefs().then(()=>loadLayout());
</script>
