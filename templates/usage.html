<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>사용자 행동 분석 - BSEYE</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',sans-serif}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#0d0d2b;border-bottom:1px solid #1a1a3a;position:sticky;top:0;z-index:100}
.hdr .logo{font-size:1.26rem;font-weight:700;color:#eee}.hdr .logo em{color:#00d4ff;font-style:normal}
.hdr .nav{display:flex;gap:4px;flex-wrap:wrap}
.hdr .nav a{color:#888;text-decoration:none;font-size:0.8rem;padding:5px 12px;border-radius:5px;transition:0.2s}
.hdr .nav a:hover,.hdr .nav a.active{color:#fff;background:#ffffff15}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:12px 16px}
.kpi{background:#12122a;border:1px solid #1a1a3e;border-radius:8px;padding:14px;text-align:center}
.kpi .val{font-size:1.8rem;font-weight:bold;line-height:1.2}
.kpi .label{font-size:0.7rem;color:#889;margin-top:4px}
.kpi.c1 .val{color:#4fc3f7}.kpi.c2 .val{color:#00ff88}.kpi.c3 .val{color:#ffd166}.kpi.c4 .val{color:#ff6b6b}.kpi.c5 .val{color:#bb86fc}

.toolbar{display:flex;gap:8px;padding:8px 16px;align-items:center;flex-wrap:wrap}
.toolbar label{font-size:0.75rem;color:#889}
.toolbar .sep{font-size:0.75rem;color:#556}
.toolbar input[type=date]{background:#1a1a3e;border:1px solid #333;border-radius:4px;color:#eee;padding:4px 8px;font-size:0.8rem}
.toolbar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
.toolbar select{background:#12122a;border:1px solid #2a2a4e;border-radius:4px;color:#e0e0e0;padding:4px 8px;font-size:0.8rem}
.toolbar button{background:#1e3a5f;color:#4fc3f7;border:1px solid #4fc3f7;border-radius:4px;padding:4px 12px;font-size:0.75rem;cursor:pointer}
.toolbar button:hover{background:#2a4a6f}
.toolbar button:disabled{background:#1a1a3e;color:#556;border-color:#333;cursor:not-allowed;opacity:0.5}
.toolbar button:disabled:hover{background:#1a1a3e}

.tabs{display:flex;gap:4px;padding:0 16px;border-bottom:1px solid #1a1a3e}
.tab{padding:8px 16px;font-size:0.8rem;color:#889;cursor:pointer;border-bottom:2px solid transparent;transition:0.2s}
.tab:hover{color:#ccc}
.tab.active{color:#4fc3f7;border-bottom-color:#4fc3f7}

.tab-content{display:none;padding:12px 16px}
.tab-content.active{display:block}

.content{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#12122a;border:1px solid #1a1a3e;border-radius:8px;padding:14px}
.card-title{font-size:0.85rem;color:#4fc3f7;font-weight:bold;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1a1a3e}
.card-full{grid-column:1/-1}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.75rem}
th{background:#0d0d2b;color:#4fc3f7;padding:8px 6px;text-align:center;border-bottom:2px solid #2a2a4e;white-space:nowrap}
td{padding:6px;text-align:center;border-bottom:1px solid #1a1a3e}
tr:hover{background:#1a1a3a}

.chart-wrap{height:250px;position:relative}

.rate-bar{width:80px;height:10px;background:#1a1a3a;border-radius:5px;overflow:hidden;display:inline-block;vertical-align:middle}
.rate-fill{height:100%;border-radius:5px}
.rate-pct{font-size:0.7rem;margin-left:4px}

.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:0.65rem;font-weight:bold}
.badge-start{background:#1b4332;color:#52b788}
.badge-end{background:#1e3a5f;color:#4fc3f7}
.badge-change{background:#5c4b1a;color:#ffd166}

.log-list{max-height:400px;overflow-y:auto}
.log-item{display:flex;gap:10px;padding:6px 8px;border-bottom:1px solid #1a1a3e;font-size:0.72rem;align-items:center}
.log-time{color:#556;width:70px;flex-shrink:0}
.log-title{flex:1;color:#ccc}
.log-elapsed{color:#889;width:60px;text-align:right;flex-shrink:0}

/* 퍼널 카드 */
.funnel-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.funnel-card{background:#12122a;border:1px solid #1a1a3e;border-radius:8px;padding:14px;cursor:pointer;transition:border-color 0.2s}
.funnel-card:hover{border-color:#4fc3f7}
.funnel-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1a1a3e;flex-wrap:wrap}
.funnel-card-hdr .fc-menu{font-size:0.9rem;font-weight:bold;color:#4fc3f7}
.funnel-card-hdr .fc-stat{font-size:0.7rem;color:#889}
.funnel-card-hdr .fc-stat b{font-weight:bold}
.funnel-card-hdr .fc-arrow{color:#556;font-size:0.7rem}
/* 깔때기 단계 */
.fnl-step{margin:0 auto 2px;height:36px;line-height:36px;text-align:center;border-radius:4px;color:#fff;font-size:0.78rem;font-weight:bold;transition:width 0.5s ease;position:relative}
.fnl-drop{text-align:center;font-size:0.65rem;color:#cc3333;line-height:1.4;padding:1px 0}
.period-label{font-size:0.9rem;color:#fff;font-weight:bold;text-align:right;padding:0 16px 0 0;white-space:nowrap}
.no-data{text-align:center;padding:30px;color:#556;font-size:0.8rem}
/* 워터폴 모달 */
.wf-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center}
.wf-modal{background:#12122a;border:1px solid #1a1a3e;border-radius:10px;padding:20px;width:90%;max-width:700px;max-height:90vh;overflow-y:auto;position:relative}
.wf-close{position:absolute;top:10px;right:14px;font-size:1.2rem;color:#889;cursor:pointer;background:none;border:none;padding:4px 8px}
.wf-close:hover{color:#fff}
.wf-title{font-size:1rem;color:#4fc3f7;font-weight:bold;margin-bottom:4px}
.wf-subtitle{font-size:0.75rem;color:#889;margin-bottom:14px}
.wf-chart-wrap{height:280px;position:relative}
.wf-times{display:flex;gap:0;margin-top:8px;font-size:0.68rem;color:#889;text-align:center}
.wf-times span{flex:1}

/* 이탈율 깔때기 */
.dropout-list{display:flex;flex-direction:column;gap:0}
.dropout-fnl{margin:0 auto 3px;height:40px;line-height:40px;text-align:center;border-radius:4px;color:#fff;font-size:0.85rem;font-weight:bold;cursor:pointer;transition:opacity 0.2s}
.dropout-fnl:hover{opacity:0.85}

/* 시간분석 */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.time-card{background:#12122a;border:1px solid #1a1a3e;border-radius:8px;padding:14px}
.time-card-title{font-size:0.8rem;color:#4fc3f7;margin-bottom:8px}

/* 클릭 가능한 셀 */
.clickable{color:#00d4ff;cursor:pointer;transition:0.15s}
.clickable:hover{text-decoration:underline}

/* 빵가루 네비게이션 */
.breadcrumb{display:flex;gap:4px;padding:4px 16px;font-size:0.75rem;color:#889;align-items:center}
.breadcrumb span{color:#889}
.bc-link{color:#4fc3f7;cursor:pointer;transition:0.15s}
.bc-link:hover{text-decoration:underline}
.bc-current{color:#e0e0e0;font-weight:bold}

@media(max-width:768px){
    .kpi-row{grid-template-columns:repeat(2,1fr);gap:6px;padding:8px}
    .kpi{padding:10px}
    .kpi .val{font-size:1.3rem}
    .kpi .label{font-size:0.65rem}
    .hdr{padding:6px 10px!important;height:auto!important;background:linear-gradient(135deg,#0d1220,#131a2e)!important;border-bottom:1px solid #1a2340!important}
    .clk{font-size:0.65rem!important}
    .hdr .logo{font-size:0.95rem}
    .content{grid-template-columns:1fr}
    .tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;gap:2px}
    .tab{white-space:nowrap;flex-shrink:0;font-size:0.72rem;padding:7px 10px}
    .toolbar{flex-wrap:wrap;gap:6px;padding:6px 8px}
    .toolbar input[type=date]{font-size:0.75rem;padding:6px;max-width:130px}
    .toolbar select{font-size:0.75rem;padding:6px}
    .hdr .nav a{font-size:0.65rem;padding:3px 6px}
    .chart-wrap{height:200px}
    .chart-wrap canvas{max-width:100%!important}
    table thead{display:none!important}
    table tbody{display:block!important}
    table tr{display:block!important;margin-bottom:8px;border:1px solid #1a1a3e;border-radius:8px;padding:10px;background:#12122a}
    table td{display:flex!important;justify-content:space-between;align-items:center;padding:4px 8px;font-size:0.78rem;border:none!important;border-bottom:1px solid #1a1a3e!important}
    table td:last-child{border-bottom:none!important}
    table td::before{content:attr(data-label);color:#889;font-size:0.68rem;font-weight:bold;margin-right:8px;white-space:nowrap;min-width:45px}
    .funnel-cards{grid-template-columns:1fr}
    .funnel-card{padding:10px}
    .fnl-step{height:28px;line-height:28px;font-size:0.7rem}
    .fnl-drop{font-size:0.58rem}
    .funnel-card-hdr{gap:6px}
    .funnel-card-hdr .fc-menu{font-size:0.8rem}
    .funnel-card-hdr .fc-stat{font-size:0.62rem}
    .wf-modal{width:95%;padding:14px}
    .wf-chart-wrap{height:220px;overflow-x:auto}
    .dropout-fnl{height:32px;line-height:32px;font-size:0.7rem;min-width:40%!important}
    .time-grid{grid-template-columns:1fr}
    .breadcrumb{padding:4px 8px;font-size:0.7rem}
    .period-label{font-size:0.75rem;float:none;display:block;text-align:right}
    .toolbar button:disabled{opacity:0.5}
}
</style>
</head>
<body>
<div class="hdr">
    <span class="logo"><em style="color:#00d4ff;font-style:normal">BS</em>EYE <span style="font-size:0.82rem;font-weight:400;color:#a0b0c0;margin-left:6px">행동분석</span></span>
    {% include 'nav.html' %}
    <span class="clk" id="clk" style="font-size:0.7rem;color:#a0b0c0;white-space:nowrap"></span>
</div>

<div class="toolbar">
    <label>기간:</label>
    <input type="date" id="t-start">
    <span class="sep">~</span>
    <input type="date" id="t-end">
    <label>병원:</label>
    <select id="t-hosp" onchange="onHospChange()"><option value="all">전체</option></select>
    <label>키오스크:</label>
    <select id="t-kiosk" onchange="onKioskDropdownChange()"><option value="all">전체</option></select>
    <button id="btn-query" onclick="loadAll()" disabled>조회</button>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<div style="display:flex;align-items:center;justify-content:space-between;padding:0 16px">
    <div style="flex:1"></div>
    <div class="period-label" id="period-label"></div>
</div>
<div class="kpi-row">
    <div class="kpi c1"><div class="val" id="k-kiosk">-</div><div class="label">활성 키오스크</div></div>
    <div class="kpi c2"><div class="val" id="k-entry">-</div><div class="label">기간 진입</div></div>
    <div class="kpi c3"><div class="val" id="k-complete">-</div><div class="label">기간 완료</div></div>
    <div class="kpi c4"><div class="val" id="k-cancel">-</div><div class="label">기간 이탈</div></div>
    <div class="kpi c5"><div class="val" id="k-rate">-</div><div class="label">완료율</div></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="showTab(0)">현황</div>
    <div class="tab" onclick="showTab(1)">퍼널 분석</div>
    <div class="tab" onclick="showTab(2)">메뉴별 이탈율</div>
    <div class="tab" onclick="showTab(3)">시간 분석</div>
    <div class="tab" onclick="showTab(4)">상세 로그</div>
</div>

<!-- 탭0: 현황 -->
<div class="tab-content active" id="tc0">
<div id="hosp-ranking-wrap" style="display:none;margin-bottom:12px">
    <div class="card card-full">
        <div class="card-title">병원별 순위</div>
        <div class="tbl-wrap">
            <table><thead><tr><th>병원코드</th><th>병원명</th><th>키오스크수</th><th>진입</th><th>완료</th><th>이탈</th><th>완료율</th></tr></thead>
            <tbody id="tb-hosp-ranking"></tbody></table>
        </div>
    </div>
</div>
<div class="content">
    <div class="card">
        <div class="card-title">키오스크별 현황</div>
        <div class="tbl-wrap">
            <table><thead><tr><th>키오스크</th><th>위치</th><th>첫사용</th><th>마지막</th><th>진입</th><th>완료</th><th>이탈</th><th>완료율</th></tr></thead>
            <tbody id="tb-summary"></tbody></table>
        </div>
    </div>
    <div class="card">
        <div class="card-title">시간대별 사용 패턴</div>
        <div class="chart-wrap"><canvas id="ch-hourly"></canvas></div>
    </div>
    <div class="card">
        <div class="card-title">일별 추이</div>
        <div class="chart-wrap"><canvas id="ch-daily"></canvas></div>
    </div>
    <div class="card">
        <div class="card-title">완료율 추이</div>
        <div class="chart-wrap"><canvas id="ch-rate"></canvas></div>
    </div>
</div>
</div>

<!-- 탭1: 퍼널 분석 -->
<div class="tab-content" id="tc1">
    <div class="funnel-cards" id="funnel-cards"></div>
</div>

<!-- 워터폴 모달 -->
<div class="wf-overlay" id="wf-overlay" style="display:none" onclick="closeWaterfall(event)">
    <div class="wf-modal" onclick="event.stopPropagation()">
        <button class="wf-close" onclick="closeWaterfall()">&times;</button>
        <div class="wf-title" id="wf-title"></div>
        <div class="wf-subtitle" id="wf-subtitle"></div>
        <div class="wf-chart-wrap"><canvas id="ch-waterfall"></canvas></div>
        <div class="wf-times" id="wf-times"></div>
    </div>
</div>

<!-- 탭2: 메뉴별 이탈율 -->
<div class="tab-content" id="tc2">
    <div class="card card-full">
        <div class="card-title">메뉴별 완료/이탈 비율</div>
        <div class="dropout-list" id="dropout-chart"></div>
    </div>
</div>

<!-- 탭3: 시간 분석 -->
<div class="tab-content" id="tc3">
    <div class="time-grid">
        <div class="time-card">
            <div class="time-card-title">메뉴별 평균 소요 시간</div>
            <div class="chart-wrap"><canvas id="ch-menu-time"></canvas></div>
        </div>
        <div class="time-card">
            <div class="time-card-title">단계별 평균 소요 시간 (선택 메뉴)</div>
            <div class="chart-wrap"><canvas id="ch-step-time"></canvas></div>
        </div>
    </div>
</div>

<!-- 탭4: 상세 로그 -->
<div class="tab-content" id="tc4">
    <div class="card card-full">
        <div class="card-title">이벤트 상세 로그 <span id="log-count" style="color:#889;font-size:0.7rem"></span></div>
        <div class="log-list" id="log-list">
            <div style="text-align:center;padding:20px;color:#556">조회 버튼을 클릭하세요</div>
        </div>
    </div>
</div>

<script>
var chHourly=null,chDaily=null,chRate=null,chMenuTime=null,chStepTime=null;
var funnelData=null, selectedMenu=null;
var hospMap={};
var selectedKioskForDetail='all';

function today(){return new Date().toISOString().slice(0,10)}
function daysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)}

document.getElementById('t-start').value=daysAgo(13);
document.getElementById('t-end').value=today();

function getStart(){return document.getElementById('t-start').value||daysAgo(13)}
function getEnd(){return document.getElementById('t-end').value||today()}

function checkQueryReady(){
    var s=document.getElementById('t-start').value;
    var e=document.getElementById('t-end').value;
    var h=document.getElementById('t-hosp').value;
    // TODO: 권한별 전체 조회 제한 — 현재는 병원 선택 필수, 향후 hq_admin은 전체 허용 가능
    document.getElementById('btn-query').disabled=!(s && e && h && h!=='all');
}
document.getElementById('t-start').addEventListener('change',checkQueryReady);
document.getElementById('t-end').addEventListener('change',checkQueryReady);
document.getElementById('t-hosp').addEventListener('change',checkQueryReady);

// ── 병원 목록 로드 ──
async function loadHospitals(){
    try{
        var r=await fetch('/api/kiosk-usage/hospitals');
        var d=await r.json();
        var sel=document.getElementById('t-hosp');
        sel.innerHTML='<option value="all">전체</option>';
        (d.hospitals||[]).forEach(function(h){
            hospMap[h.hosp_cd]=h.hosp_nm;
            sel.innerHTML+='<option value="'+h.hosp_cd+'">'+h.hosp_nm+'</option>';
        });
    }catch(e){console.error(e)}
}

function getHospCd(){return document.getElementById('t-hosp').value}
function getKioskId(){return document.getElementById('t-kiosk').value}
function getEffectiveKiosk(){return selectedKioskForDetail!=='all'?selectedKioskForDetail:getKioskId()}
function getDetailKiosk(){return selectedKioskForDetail}

async function onHospChange(){
    var hc=getHospCd();
    var sel=document.getElementById('t-kiosk');
    sel.innerHTML='<option value="all">전체</option>';
    selectedKioskForDetail='all';
    if(hc && hc!=='all'){
        try{
            var r=await fetch('/api/kiosk-usage/kiosks?hosp_cd='+hc);
            var d=await r.json();
            (d.kiosks||[]).forEach(function(k){sel.innerHTML+='<option value="'+k.kiosk_id+'">'+k.kiosk_id+'</option>'});
        }catch(e){console.error(e)}
    }
    sel.value='all';
    checkQueryReady();
}

function onKioskDropdownChange(){
    selectedKioskForDetail='all';
    loadAll();
}

function showTab(n){
    document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',i===n)});
    document.querySelectorAll('.tab-content').forEach(function(t,i){t.classList.toggle('active',i===n)});
    if(n===1 && funnelData) renderFunnel();
    if(n===4) loadDetail();
}

function loadAll(){
    updateBreadcrumb();
    updatePeriodLabel();
    loadData();
    loadFunnel();
}

function updatePeriodLabel(){
    var sd=getStart().replace(/-/g,'.');
    var ed=getEnd().replace(/-/g,'.');
    var d1=new Date(getStart()),d2=new Date(getEnd());
    var diff=Math.round((d2-d1)/(1000*60*60*24))+1;
    document.getElementById('period-label').textContent=sd+' ~ '+ed+' ('+diff+'일간)';
}

// ── 탭0: 현황 ──
async function loadData(){
    var sd=getStart(),ed=getEnd();
    var hc=getHospCd(),kid=getEffectiveKiosk();
    try{
        var r=await fetch('/api/kiosk-usage/dashboard?start_date='+sd+'&end_date='+ed+'&hosp_cd='+hc+'&kiosk_id='+kid);
        var d=await r.json();
        document.getElementById('k-kiosk').textContent=d.active_kiosks;
        document.getElementById('k-entry').textContent=d.total_entry;
        document.getElementById('k-complete').textContent=d.total_complete;
        document.getElementById('k-cancel').textContent=d.total_cancel;
        document.getElementById('k-rate').textContent=d.complete_rate+'%';

        // 병원 랭킹
        var rankWrap=document.getElementById('hosp-ranking-wrap');
        if(hc==='all' && kid==='all' && d.hospital_ranking && d.hospital_ranking.length>0){
            var rh='';
            d.hospital_ranking.forEach(function(hr){
                var rc=hr.total_entry>0?Math.round(hr.total_complete/hr.total_entry*100):0;
                var color=rc>=80?'#00ff88':rc>=60?'#ffd166':'#ff6b6b';
                var nm=hospMap[hr.hosp_cd]||hr.hosp_cd;
                rh+='<tr><td data-label="병원코드" class="clickable" onclick="selectHosp(\''+hr.hosp_cd+'\')">'+hr.hosp_cd+'</td>';
                rh+='<td data-label="병원명" class="clickable" onclick="selectHosp(\''+hr.hosp_cd+'\')">'+nm+'</td>';
                rh+='<td data-label="키오스크수">'+hr.kiosk_count+'</td>';
                rh+='<td data-label="진입" style="color:#00ff88;font-weight:bold">'+hr.total_entry+'</td>';
                rh+='<td data-label="완료" style="color:#4fc3f7;font-weight:bold">'+hr.total_complete+'</td>';
                rh+='<td data-label="이탈" style="color:#ff6b6b;font-weight:bold">'+hr.total_cancel+'</td>';
                rh+='<td data-label="완료율"><div class="rate-bar"><div class="rate-fill" style="width:'+rc+'%;background:'+color+'"></div></div><span class="rate-pct" style="color:'+color+'">'+rc+'%</span></td></tr>';
            });
            document.getElementById('tb-hosp-ranking').innerHTML=rh;
            rankWrap.style.display='block';
        }else{
            rankWrap.style.display='none';
        }

        var h='';
        (d.summary||[]).forEach(function(s){
            var rc=s.complete_rate||0;
            var color=rc>=80?'#00ff88':rc>=60?'#ffd166':'#ff6b6b';
            h+='<tr><td data-label="키오스크" class="clickable" onclick="selectKiosk(\''+s.kiosk_id+'\')">'+s.kiosk_id+'</td><td data-label="위치">'+(s.location||'-')+'</td><td data-label="첫사용">'+(s.first_use_time||'-')+'</td><td data-label="마지막">'+(s.last_use_time||'-')+'</td>';
            h+='<td data-label="진입" style="color:#00ff88;font-weight:bold">'+s.total_entry+'</td><td data-label="완료" style="color:#4fc3f7;font-weight:bold">'+s.total_complete+'</td>';
            h+='<td data-label="이탈" style="color:#ff6b6b;font-weight:bold">'+s.total_cancel+'</td>';
            h+='<td data-label="완료율"><div class="rate-bar"><div class="rate-fill" style="width:'+rc+'%;background:'+color+'"></div></div><span class="rate-pct" style="color:'+color+'">'+rc+'%</span></td></tr>';
        });
        document.getElementById('tb-summary').innerHTML=h||'<tr><td colspan="8" style="color:#556">데이터 없음</td></tr>';

        if(hc==='all'){
            var sel=document.getElementById('t-kiosk');
            var cur=sel.value;
            sel.innerHTML='<option value="all">전체</option>';
            (d.summary||[]).forEach(function(s){sel.innerHTML+='<option value="'+s.kiosk_id+'">'+s.kiosk_id+'</option>'});
            sel.value=cur;
        }

        renderHourlyChart(d.hourly_pattern);
        loadDailyTrend();
    }catch(e){console.error(e)}
}

function renderHourlyChart(hp){
    if(chHourly)chHourly.destroy();
    if(!hp){document.getElementById('ch-hourly').parentElement.innerHTML='<div class="no-data">시간대 데이터 없음</div>';return}
    var labels=[];for(var i=0;i<24;i++)labels.push(i+'시');
    chHourly=new Chart(document.getElementById('ch-hourly'),{type:'bar',
        data:{labels:labels,datasets:[
            {label:'14일 평균',data:hp.avg_14d,backgroundColor:'#55555566',borderColor:'#555',borderWidth:1,borderRadius:2,barPercentage:0.5,categoryPercentage:0.8,order:2},
            {label:'선택 기간',data:hp.period,backgroundColor:'#00d4ff66',borderColor:'#00d4ff',borderWidth:1,borderRadius:3,barPercentage:0.5,categoryPercentage:0.8,order:1}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:true,labels:{color:'#ccc',font:{size:10},usePointStyle:true,pointStyle:'circle'}}},
            scales:{x:{ticks:{color:'#889',font:{size:9},maxRotation:0},grid:{display:false}},y:{ticks:{color:'#889',font:{size:10}},grid:{color:'#1a1a3e'}}}}});
}

async function loadDailyTrend(){
    var sd=getStart(),ed=getEnd();
    var kid=getEffectiveKiosk();
    try{
        var r=await fetch('/api/kiosk-usage/daily?start_date='+sd+'&end_date='+ed+'&kiosk_id='+kid+'&hosp_cd='+getHospCd());
        var d=await r.json();
        var map={};(d.data||[]).forEach(function(row){if(!map[row.work_date])map[row.work_date]={entry:0,complete:0};map[row.work_date].entry+=row.total_entry;map[row.work_date].complete+=row.total_complete});
        var labels=[],entries=[],completes=[],rates=[];
        var cur=new Date(sd);var endD=new Date(ed);
        while(cur<=endD){var ds=cur.toISOString().slice(0,10);labels.push(ds.slice(5));var m=map[ds]||{entry:0,complete:0};entries.push(m.entry);completes.push(m.complete);rates.push(m.entry>0?Math.round(m.complete/m.entry*100):0);cur.setDate(cur.getDate()+1)}

        if(chDaily)chDaily.destroy();
        chDaily=new Chart(document.getElementById('ch-daily'),{type:'bar',data:{labels:labels,datasets:[{label:'진입',data:entries,backgroundColor:'#4fc3f766',borderColor:'#4fc3f7',borderWidth:1,borderRadius:3,barPercentage:0.4},{label:'완료',data:completes,backgroundColor:'#00ff8866',borderColor:'#00ff88',borderWidth:1,borderRadius:3,barPercentage:0.4}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#ccc',font:{size:10},usePointStyle:true,pointStyle:'circle'}}},scales:{x:{ticks:{color:'#889',font:{size:10},maxRotation:45},grid:{display:false}},y:{ticks:{color:'#889',font:{size:10}},grid:{color:'#1a1a3e'}}}}});

        if(chRate)chRate.destroy();
        chRate=new Chart(document.getElementById('ch-rate'),{type:'line',data:{labels:labels,datasets:[{label:'완료율(%)',data:rates,borderColor:'#bb86fc',backgroundColor:'#bb86fc22',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#bb86fc',borderWidth:2.5},{label:'80% 기준',data:labels.map(function(){return 80}),borderColor:'#ff6b6b55',borderWidth:1.5,borderDash:[6,4],pointRadius:0,fill:false}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#ccc',font:{size:10},usePointStyle:true,pointStyle:'circle'}}},scales:{x:{ticks:{color:'#889',font:{size:10},maxRotation:45},grid:{display:false}},y:{min:0,max:100,ticks:{color:'#889',font:{size:10},callback:function(v){return v+'%'}},grid:{color:'#1a1a3e'}}}}});
    }catch(e){console.error(e)}
}

// ── 탭1: 퍼널 분석 (메뉴별 독립 카드) ──
async function loadFunnel(){
    var sd=getStart(),ed=getEnd();
    var kid=getEffectiveKiosk();
    try{
        var r=await fetch('/api/kiosk-usage/funnel?start_date='+sd+'&end_date='+ed+'&kiosk_id='+(kid==='all'?'':kid)+'&hosp_cd='+getHospCd());
        funnelData=await r.json();
        if(funnelData.menus&&funnelData.menus.length>0){selectedMenu=funnelData.menus[0].menu}
        renderFunnel();
        renderDropout();
        renderTimeCharts();
    }catch(e){console.error(e)}
}

var chWaterfall=null;

function renderFunnel(){
    var el=document.getElementById('funnel-cards');
    if(!funnelData||!funnelData.menus||funnelData.menus.length===0){
        el.innerHTML='<div class="no-data">데이터 없음</div>';
        return;
    }
    var html='';
    funnelData.menus.forEach(function(m,mi){
        var rc=m.rate;
        var rColor=rc>=80?'#00ff88':rc>=60?'#ffd166':'#ff6b6b';
        html+='<div class="funnel-card" onclick="openWaterfall('+mi+')">';
        html+='<div class="funnel-card-hdr">';
        html+='<span class="fc-menu">'+m.menu+'</span>';
        html+='<span class="fc-stat">진입 <b style="color:#4fc3f7">'+m.total+'</b>건</span>';
        html+='<span class="fc-arrow">&rarr;</span>';
        html+='<span class="fc-stat">완료 <b style="color:#00ff88">'+m.completed+'</b>건</span>';
        html+='<span class="fc-stat" style="margin-left:auto">완료율 <b style="color:'+rColor+'">'+rc+'%</b></span>';
        html+='</div>';

        // 깔때기 (사다리꼴 블록)
        var maxCount=m.total||1;
        (m.funnel||[]).forEach(function(f,fi){
            var w=Math.max(f.count/maxCount*100,20);
            var isComplete=f.step.indexOf('완료')>=0;
            var bg=isComplete?'#0a8a5a':'#0a7ea8';
            html+='<div class="fnl-step" style="width:'+w+'%;background:'+bg+'">';
            html+=f.step+' <span style="opacity:0.8">'+f.count+'</span> <span style="font-size:0.65rem;opacity:0.7">'+f.pct+'%</span>';
            html+='</div>';
            // 이탈 표시 (마지막 단계 제외)
            if(f.cancel_count>0 && fi<m.funnel.length-1){
                html+='<div class="fnl-drop">&darr; -'+f.cancel_count+' 이탈</div>';
            }
        });
        html+='</div>';
    });
    el.innerHTML=html;
}

function openWaterfall(menuIdx){
    if(!funnelData||!funnelData.menus||!funnelData.menus[menuIdx])return;
    var m=funnelData.menus[menuIdx];
    var rc=m.rate;
    var rColor=rc>=80?'#00ff88':rc>=60?'#ffd166':'#ff6b6b';

    document.getElementById('wf-title').textContent=m.menu+' 퍼널 상세';
    document.getElementById('wf-subtitle').innerHTML='진입 <b style="color:#4fc3f7">'+m.total+'</b>건 &rarr; 완료 <b style="color:#00ff88">'+m.completed+'</b>건 (완료율 <b style="color:'+rColor+'">'+rc+'%</b>)';

    var labels=[],stayData=[],dropData=[],bgStay=[],bgDrop=[],bdStay=[],bdDrop=[];
    var times='';
    (m.funnel||[]).forEach(function(f){
        labels.push(f.step);
        var stayed=f.count-(f.cancel_count||0);
        var isComplete=f.step.indexOf('완료')>=0;
        stayData.push(stayed);
        dropData.push(f.cancel_count||0);
        bgStay.push(isComplete?'#0a8a5a88':'#0a7ea888');
        bdStay.push(isComplete?'#0a8a5a':'#0a7ea8');
        bgDrop.push('#cc333388');
        bdDrop.push('#cc3333');
        times+='<span>'+f.avg_sec+'초</span>';
    });
    document.getElementById('wf-times').innerHTML=times;

    if(chWaterfall)chWaterfall.destroy();
    var canvas=document.getElementById('ch-waterfall');
    chWaterfall=new Chart(canvas,{type:'bar',
        data:{labels:labels,datasets:[
            {label:'잔존',data:stayData,backgroundColor:bgStay,borderColor:bdStay,borderWidth:1,borderRadius:3},
            {label:'이탈',data:dropData,backgroundColor:bgDrop,borderColor:bdDrop,borderWidth:1,borderRadius:3}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
            plugins:{
                legend:{display:true,labels:{color:'#ccc',font:{size:10},usePointStyle:true,pointStyle:'circle'}},
                tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.raw+'건'}}}
            },
            scales:{
                x:{stacked:true,ticks:{color:'#ccc',font:{size:10},maxRotation:45},grid:{display:false}},
                y:{stacked:true,ticks:{color:'#889',font:{size:10}},grid:{color:'#1a1a3e'}}
            }
        }
    });

    document.getElementById('wf-overlay').style.display='flex';
}

function closeWaterfall(e){
    if(e && e.target!==document.getElementById('wf-overlay'))return;
    document.getElementById('wf-overlay').style.display='none';
    if(chWaterfall){chWaterfall.destroy();chWaterfall=null}
}

// ── 탭2: 메뉴별 이탈율 (깔때기형, 완료율 높은 순) ──
function renderDropout(){
    var el=document.getElementById('dropout-chart');
    if(!funnelData||!funnelData.menus||funnelData.menus.length===0){
        el.innerHTML='<div class="no-data">데이터 없음</div>';
        return;
    }
    var sorted=funnelData.menus.slice().sort(function(a,b){return b.rate-a.rate});
    var maxRate=sorted[0].rate||1;
    var html='';
    sorted.forEach(function(m){
        var w=Math.max(m.rate/maxRate*100,30);
        var rc=m.rate;
        var bg=rc>=70?'#0a8a5a':rc>=50?'#0a7ea8':'#cc3333';
        var mi=funnelData.menus.indexOf(m);
        html+='<div class="dropout-fnl" style="width:'+w+'%;background:'+bg+'" onclick="jumpToFunnelCard('+mi+')">';
        html+=m.menu+' | '+rc+'% | 진입 '+m.total+'건 &rarr; 완료 '+m.completed+'건';
        html+='</div>';
    });
    el.innerHTML=html;
}

function jumpToFunnelCard(menuIdx){
    showTab(1);
    setTimeout(function(){
        var cards=document.querySelectorAll('.funnel-card');
        if(cards[menuIdx]) cards[menuIdx].scrollIntoView({behavior:'smooth',block:'center'});
    },150);
}

// ── 탭3: 시간 분석 ──
function renderTimeCharts(){
    if(!funnelData||!funnelData.menus||funnelData.menus.length===0)return;
    if(!selectedMenu && funnelData.menus.length>0) selectedMenu=funnelData.menus[0].menu;

    var labels=[],data=[],colors=[];
    var palette=['#4fc3f7','#00ff88','#ffd166','#ff6b6b','#bb86fc','#ff9800','#e91e63'];
    funnelData.menus.forEach(function(m,i){
        labels.push(m.menu);
        var totalSec=0;m.funnel.forEach(function(f){totalSec+=f.avg_sec});
        data.push(totalSec);
        colors.push(palette[i%palette.length]);
    });

    if(chMenuTime)chMenuTime.destroy();
    chMenuTime=new Chart(document.getElementById('ch-menu-time'),{type:'bar',
        data:{labels:labels,datasets:[{label:'평균 소요(초)',data:data,backgroundColor:colors.map(function(c){return c+'88'}),borderColor:colors,borderWidth:1,borderRadius:4,barPercentage:0.6}]},
        options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},
            scales:{x:{ticks:{color:'#889',font:{size:10},callback:function(v){return v+'초'}},grid:{color:'#1a1a3e'}},y:{ticks:{color:'#ccc',font:{size:11}},grid:{display:false}}}}});

    renderStepTime();
}

function renderStepTime(){
    if(!funnelData||!funnelData.menus)return;
    var m=funnelData.menus.find(function(x){return x.menu===selectedMenu});
    if(!m)return;

    var labels=[],data=[];
    m.funnel.forEach(function(f){labels.push(f.step.replace(m.menu+'_',''));data.push(f.avg_sec)});

    if(chStepTime)chStepTime.destroy();
    chStepTime=new Chart(document.getElementById('ch-step-time'),{type:'bar',
        data:{labels:labels,datasets:[{label:selectedMenu+' 단계별 소요(초)',data:data,
            backgroundColor:data.map(function(v){return v>=20?'#ff6b6b88':v>=10?'#ffd16688':'#4fc3f788'}),
            borderColor:data.map(function(v){return v>=20?'#ff6b6b':v>=10?'#ffd166':'#4fc3f7'}),
            borderWidth:1,borderRadius:4,barPercentage:0.6}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
            scales:{x:{ticks:{color:'#889',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#889',font:{size:10},callback:function(v){return v+'초'}},grid:{color:'#1a1a3e'}}}}});
}

// ── 탭4: 상세 로그 ──
async function loadDetail(){
    var dt=getEnd();
    var kid=getEffectiveKiosk();
    if(kid==='all'){var opts=document.getElementById('t-kiosk').options;if(opts.length>1)kid=opts[1].value;else return}
    try{
        var r=await fetch('/api/kiosk-usage/detail?kiosk_id='+kid+'&work_date='+dt);
        var d=await r.json();
        document.getElementById('log-count').textContent='('+d.count+'건)';
        var h='';
        (d.logs||[]).forEach(function(l){
            var time=l.log_dt?l.log_dt.substring(11,19):'';
            var bc=l.status==='START'?'badge-start':l.status==='END'?'badge-end':'badge-change';
            h+='<div class="log-item"><span class="log-time">'+time+'</span><span class="badge '+bc+'">'+l.status+'</span><span class="log-title">'+(l.window_title||'-')+'</span><span class="log-elapsed">'+(l.elapsed_str||'-')+'</span></div>';
        });
        document.getElementById('log-list').innerHTML=h||'<div style="text-align:center;padding:20px;color:#556">로그 없음</div>';
    }catch(e){console.error(e)}
}

function selectHosp(code){
    document.getElementById('t-hosp').value=code;
    selectedKioskForDetail='all';
    onHospChange();
}

function selectKiosk(kid){
    selectedKioskForDetail=kid;
    updateBreadcrumb();
    loadAll();
}

function updateBreadcrumb(){
    var hc=getHospCd();
    var kid=selectedKioskForDetail;
    var el=document.getElementById('breadcrumb');
    if(hc==='all'){
        el.innerHTML='<span class="bc-current">전체</span>';
        return;
    }
    var hName=hospMap[hc]||hc;
    var html='<span class="bc-link" onclick="selectHosp(\'all\')">전체</span><span> &gt; </span>';
    if(kid==='all'){
        html+='<span class="bc-current">'+hName+'</span>';
    }else{
        html+='<span class="bc-link" onclick="selectedKioskForDetail=\'all\';updateBreadcrumb();loadFunnel()">'+hName+'</span>';
        html+='<span> &gt; </span><span class="bc-current">'+kid+'</span>';
    }
    el.innerHTML=html;
}

loadHospitals();
