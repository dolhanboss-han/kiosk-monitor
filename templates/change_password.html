<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 - BSEYE</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#eee;display:flex;justify-content:center;align-items:center;height:100vh;}
        .box{background:#1a1a2e;border:1px solid #333;border-radius:16px;padding:35px;width:400px;}
        .box h1{color:#00d4ff;font-size:1.4rem;margin-bottom:5px;}
        .box p{color:#888;font-size:0.85rem;margin-bottom:25px;}
        .form-group{margin-bottom:18px;}
        .form-group label{display:block;color:#aaa;font-size:0.85rem;margin-bottom:6px;}
        .form-group input{width:100%;padding:10px 12px;background:#252540;border:1px solid #333;border-radius:6px;color:#eee;font-size:0.95rem;outline:none;}
        .form-group input:focus{border-color:#00d4ff;}
        .btn{width:100%;padding:12px;background:#00d4ff;color:#0f0f1a;border:none;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer;margin-top:5px;}
        .btn:hover{background:#00b8e6;}
        .cancel{display:block;text-align:center;margin-top:15px;color:#888;text-decoration:none;font-size:0.85rem;}
        .cancel:hover{color:#00d4ff;}
        .flash{background:#ff444422;color:#ff4444;padding:10px;border-radius:6px;margin-bottom:15px;font-size:0.85rem;}
        .flash.ok{background:#00ff8822;color:#00ff88;}
        @media(max-width:600px){
            .box{width:90%;padding:25px;}
        }
    </style>
</head>
<body style="padding-top:60px">
<div class="header" style="position:fixed;top:0;left:0;right:0;z-index:1000;background:#111130;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333;height:48px;">
    <span style="font-size:1.1rem;font-weight:bold;color:#00d4ff;white-space:nowrap">BSEYE Monitor</span>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:nowrap">
        <a href="/" style="color:#999;text-decoration:none;font-size:0.78rem;padding:4px 10px;border:1px solid #333;border-radius:6px;white-space:nowrap" id="nav_dash">대시보드</a>
        <a href="/monitoring" style="color:#999;text-decoration:none;font-size:0.78rem;padding:4px 10px;border:1px solid #333;border-radius:6px;white-space:nowrap" id="nav_mon">모니터링</a>
        <a href="/hospitals" style="color:#999;text-decoration:none;font-size:0.78rem;padding:4px 10px;border:1px solid #333;border-radius:6px;white-space:nowrap" id="nav_hosp">병원</a>
        <a href="/alarms" style="color:#999;text-decoration:none;font-size:0.78rem;padding:4px 10px;border:1px solid #333;border-radius:6px;white-space:nowrap" id="nav_alarm">알람</a>
        <a href="/tickets" style="color:#999;text-decoration:none;font-size:0.78rem;padding:4px 10px;border:1px solid #333;border-radius:6px;white-space:nowrap" id="nav_ticket">티켓</a>
        <a href="/editor" style="color:#999;text-decoration:none;font-size:0.78rem;padding:4px 10px;border:1px solid #333;border-radius:6px;white-space:nowrap" id="nav_editor">에디터</a>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
        <span style="color:#aaa;font-size:0.78rem;white-space:nowrap">{{ session.get('user_name', '') }}</span>
        <a href="/change-password" style="color:#aaa;text-decoration:none;font-size:0.72rem">비밀번호</a>
        <a href="/logout" style="color:#ff6b6b;text-decoration:none;font-size:0.72rem">로그아웃</a>
    </div>
</div>
<script>
(function(){
    var path=location.pathname;
    var map={'/':'nav_dash','/monitoring':'nav_mon','/hospitals':'nav_hosp','/alarms':'nav_alarm','/tickets':'nav_ticket','/editor':'nav_editor'};
    for(var k in map){if(path===k||path.startsWith(k+'/')){var el=document.getElementById(map[k]);if(el){el.style.color='#00d4ff';el.style.borderColor='#00d4ff';}break;}}
})();
</script>
    <div class="box">
        <h1>비밀번호 변경</h1>
        <p>{{ session.user_name }} ({{ session.username }})</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>현재 비밀번호</label>
                <input type="password" name="current_password" required>
            </div>
            <div class="form-group">
                <label>새 비밀번호 (6자 이상)</label>
                <input type="password" name="new_password" required>
            </div>
            <div class="form-group">
                <label>새 비밀번호 확인</label>
                <input type="password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn">비밀번호 변경</button>
        </form>
        <a href="/" class="cancel">취소</a>
    </div>
</body>
</html>
