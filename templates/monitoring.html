<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키오스크 모니터링 - BSEYE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#eee;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;font-size:0.98rem}

/* Header */
.hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:#111130;padding:0 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333;height:46px}
.hdr .logo{font-size:1.4rem;font-weight:700;color:#eee}.hdr .logo em{color:#00d4ff;font-style:normal}

/* Layout */
.wrap{height:calc(100vh - 46px);margin-top:46px;display:flex;flex-direction:column;padding:8px 12px}

/* Alert Bar */
.alert-bar{display:flex;gap:8px;margin-bottom:8px;flex-shrink:0;min-height:38px;align-items:stretch;flex-wrap:wrap}
.alert-item{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:8px;font-size:0.88rem;font-weight:600;cursor:pointer;transition:0.2s;white-space:nowrap}
.alert-item:hover{transform:scale(1.03);filter:brightness(1.2)}
.alert-item.critical{background:#ff444430;border:1px solid #ff5555;color:#ff8888}
.alert-item.warning{background:#ffaa0020;border:1px solid #ffaa00;color:#ffcc44}
.alert-item.ok{background:#00ff8815;border:1px solid #00ff8840;color:#00ff88}
.alert-item .alert-icon{font-size:1.05rem}
.alert-item .alert-count{font-size:1.3rem;font-weight:700}
.alert-detail{font-size:0.78rem;color:#aaa;margin-left:4px}

/* Stats */
.stats{display:flex;gap:6px;margin-bottom:8px;flex-shrink:0}
.st{background:#1a1a3e;border:1px solid #2a2a4e;border-radius:6px;padding:6px 14px;text-align:center;flex:1;cursor:pointer;transition:0.2s}
.st:hover{border-color:#00d4ff}
.st .n{font-size:1.75rem;font-weight:bold}
.st .l{font-size:0.78rem;color:#889}
.n.c1{color:#00d4ff}.n.c2{color:#00ff88}.n.c3{color:#ff4444}.n.c4{color:#ffaa00}.n.c5{color:#aa88ff}.n.c6{color:#ff88aa}

/* Toolbar */
.tb{display:flex;gap:6px;margin-bottom:8px;align-items:center;flex-shrink:0}
.sb{background:#12122a;border:1px solid #444;border-radius:5px;padding:5px 12px;color:#eee;font-size:0.95rem;width:240px;outline:none}
.sb:focus{border-color:#00d4ff}
.fb{background:#1a1a3e;border:1px solid #333;border-radius:5px;padding:4px 12px;color:#777;font-size:0.88rem;cursor:pointer}
.fb:hover,.fb.on{background:#00d4ff22;color:#00d4ff;border-color:#00d4ff55}
.ri{margin-left:auto;font-size:0.82rem;color:#667}

/* Split view */
.hl-item{background:#12122a;border:1px solid #2a2a4e;border-radius:6px;padding:8px 10px;cursor:pointer;transition:0.15s}
.hl-item:hover{border-color:#00d4ff;background:#1a1a3a}
.hl-item.active{border-color:#00d4ff;background:#0d2a4a;border-left:3px solid #00d4ff}
.hl-item.has-critical{border-left:3px solid #ff4444;animation:pulse-red 2s infinite}
.hl-item.has-warning{border-left:3px solid #ffaa00}
.hl-item .hl-name{font-size:0.9rem;color:#e0e0e0;font-weight:bold}
.hl-item .hl-code{font-size:0.7rem;color:#556}
.hl-item .hl-stats{display:flex;gap:8px;margin-top:4px;font-size:0.72rem}
.hl-item .hl-on{color:#00ff88}
.hl-item .hl-off{color:#ff7777}
.hl-item .hl-warn{color:#ffd166}
.hl-item .hl-alert-tag{font-size:0.65rem;padding:2px 6px;border-radius:3px;margin-top:3px;display:inline-block}
.hl-item .hl-alert-tag.crit{background:#ff444435;color:#ff9999;animation:blink-alert 1.5s infinite}
.hl-item .hl-alert-tag.warn{background:#ffaa0020;color:#ffcc44}

@keyframes pulse-red{0%,100%{border-left-color:#ff4444}50%{border-left-color:#ff444440}}
@keyframes blink-alert{0%,100%{opacity:1}50%{opacity:0.5}}

/* Detail cards */
.detail-title{font-size:1.15rem;color:#4fc3f7;font-weight:bold;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #2a2a4e}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.dk-card{background:#12122a;border:1px solid #2a2a4e;border-radius:8px;padding:14px}
.dk-card.on{border-left:3px solid #00ff88}
.dk-card.err{border-left:3px solid #ff4444}
.dk-card.off{border-left:3px solid #555;opacity:0.7}
.dk-card.has-alert{animation:pulse-red 2s infinite}
.dk-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.dk-id{font-size:1.02rem;font-weight:bold;color:#e0e0e0}
.dk-status{font-size:0.75rem;padding:3px 10px;border-radius:3px}
.dk-st-on{background:#1b4332;color:#52b788}
.dk-st-err{background:#6a2020;color:#ff8888}
.dk-st-off{background:#333;color:#888}
.dk-elapsed{font-size:0.72rem;margin-top:2px}
.dk-elapsed.danger{color:#ff8888;font-weight:bold;animation:blink-alert 1.5s infinite}
.dk-elapsed.warn{color:#ffaa00}
.dk-elapsed.ok{color:#667}
.dk-section{margin:8px 0}
.dk-section-title{font-size:0.78rem;color:#4fc3f7;margin-bottom:4px}
.dk-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.dk-bar-item{display:flex;align-items:center;gap:4px}
.dk-bar-label{font-size:0.72rem;color:#889;width:34px}
.dk-bar{flex:1;height:12px;background:#1a1a3a;border-radius:5px;overflow:hidden}
.dk-bar-fill{height:100%;border-radius:5px}
.dk-bar-val{font-size:0.72rem;color:#aab;width:32px;text-align:right}
.dk-devs{display:flex;gap:12px;flex-wrap:wrap}
.dk-dev{display:flex;align-items:center;gap:6px;font-size:0.88rem;font-weight:500}
.dk-dev-dot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 4px currentColor}
.dk-prt{margin-top:6px;padding:10px;background:#0d0d20;border-radius:6px}
.dk-prt-title{font-size:0.82rem;color:#aab;margin-bottom:6px}
.dk-prt-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.dk-prt-item{display:flex;align-items:center;gap:4px}
.dk-prt-label{font-size:0.7rem;color:#889;width:46px}
.dk-prt-bar{flex:1;height:16px;background:#1a1a3a;border-radius:6px;overflow:hidden;position:relative}
.dk-prt-fill{height:100%;border-radius:6px;box-shadow:0 0 4px rgba(255,255,255,0.15)}
.dk-prt-pct{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:0.65rem;color:#ffffff;font-weight:700;text-shadow:0 0 3px #00000088}
.dk-prt-warn{font-size:0.65rem;margin-top:4px;padding:3px 6px;border-radius:3px;display:inline-block}
.dk-prt-warn.crit{background:#ff444430;color:#ff9999;animation:blink-alert 1.5s infinite}
.dk-prt-warn.warn-tag{background:#ffaa0020;color:#ffcc44}
.dk-print-stats{display:flex;gap:14px;margin-top:6px;font-size:0.72rem}
.dk-remote{margin-top:8px;padding-top:8px;border-top:1px solid #2a2a4e;display:flex;align-items:center;gap:8px}
.dk-remote-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:0.2s;text-decoration:none;border:none}
.dk-remote-btn.tv{background:#0066cc30;border:1px solid #0088ff;color:#44aaff}
.dk-remote-btn.tv:hover{background:#0066cc50;transform:scale(1.03)}
.dk-remote-btn.disabled{background:#222;border:1px solid #333;color:#555;cursor:default;pointer-events:none}
.dk-remote-id{font-size:0.68rem;color:#778}

/* Insight Panel */
.insight-panel{background:#111130;border:1px solid #2a2a4e;border-radius:6px;padding:10px 14px;margin-bottom:8px;flex-shrink:0;display:none}
.insight-panel.show{display:block}
.insight-title{font-size:0.88rem;font-weight:bold;color:#ff6666;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.insight-list{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto}
.insight-item{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:4px;font-size:0.8rem;cursor:pointer;transition:0.15s}
.insight-item:hover{background:#ffffff10}
.insight-item.critical{border-left:3px solid #ff5555;color:#ffaaaa}
.insight-item.warning{border-left:2px solid #ffaa00;color:#ffcc66}
.insight-item .insight-action{margin-left:auto;color:#4fc3f7;font-size:0.72rem;white-space:nowrap}

/* Tooltip */
.tooltip{display:none;position:fixed;background:#1a1a3eee;border:1px solid #00d4ff55;border-radius:8px;padding:12px;z-index:9999;width:380px;backdrop-filter:blur(10px);box-shadow:0 8px 30px #00000088}
.tooltip.show{display:block}

/* Mobile */
@media(max-width:768px){
    body{overflow:auto!important;height:auto!important;font-size:0.9rem}
    .hdr{height:auto!important;padding:6px 10px!important;background:linear-gradient(135deg,#0d1220,#131a2e)!important;border-bottom:1px solid #1a2340!important}
    .clk{font-size:0.65rem!important}
    .hdr .logo{font-size:0.95rem}
    .wrap{height:auto;margin-top:44px;padding:6px 8px;overflow:auto}
    .alert-bar{flex-direction:column}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
    .st{padding:6px 4px}.st .n{font-size:1.3rem}.st .l{font-size:0.68rem}
    .tb{flex-wrap:wrap;gap:4px}
    .sb{width:100%;font-size:0.9rem;padding:8px 12px}
    .fb{padding:5px 10px;font-size:0.78rem}
    .ri{width:100%;text-align:right;font-size:0.68rem}
    #split-view{flex-direction:column!important}
    #hosp-list{width:100%!important;min-width:100%!important;max-height:150px;flex-direction:row!important;flex-wrap:wrap;overflow-x:auto}
    .hl-item{min-width:130px}
    .detail-grid{grid-template-columns:1fr}
    .tooltip{display:none!important}
}
@media(max-width:480px){
    .stats{grid-template-columns:repeat(3,1fr)}.st .n{font-size:1.1rem}
}
</style>
</head>
<body>
<div class="hdr">
    <span class="logo"><em>BS</em>EYE <span style="font-size:0.92rem;font-weight:400;color:#a0b0c0;margin-left:6px">키오스크 모니터링</span></span>
    {% include 'nav.html' %}
    <span class="clk" id="clk" style="font-size:0.78rem;color:#a0b0c0;white-space:nowrap"></span>
</div>
<div class="wrap">
    <!-- Alert Summary Bar -->
    <div class="alert-bar" id="alert-bar"></div>

    <!-- Insight Panel -->
    <div class="insight-panel" id="insight-panel">
        <div class="insight-title"><span style="font-size:1.1rem">⚠</span> 이상 감지 현황 <span style="font-size:0.72rem;color:#667;margin-left:auto;cursor:pointer" onclick="toggleInsight()">접기 ▲</span></div>
        <div class="insight-list" id="insight-list"></div>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="st" onclick="setFilter('all')"><div class="n c1" id="o-h">-</div><div class="l">병원</div></div>
        <div class="st" onclick="setFilter('all')"><div class="n c1" id="o-k">-</div><div class="l">키오스크</div></div>
        <div class="st" onclick="setFilter('online')"><div class="n c2" id="o-on">-</div><div class="l">온라인</div></div>
        <div class="st" onclick="setFilter('offline')"><div class="n c3" id="o-off">-</div><div class="l">오프라인</div></div>
        <div class="st" onclick="setFilter('warning')"><div class="n c4" id="o-w">-</div><div class="l">프린터경고</div></div>
        <div class="st" onclick="setFilter('warning')"><div class="n c5" id="o-e">-</div><div class="l">장치오류</div></div>
    </div>

    <!-- Toolbar -->
    <div class="tb">
        <input type="text" class="sb" id="sb" placeholder="병원명/코드 검색...">
        <div class="fb on" data-f="all">전체</div>
        <div class="fb" data-f="online">온라인</div>
        <div class="fb" data-f="offline">오프라인</div>
        <div class="fb" data-f="warning">경고</div>
        <div class="fb" data-f="critical">긴급</div>
        <a href="/maintenance" style="background:#1e3a5f;color:#4fc3f7;border:1px solid #4fc3f7;margin-left:8px;padding:5px 14px;border-radius:4px;text-decoration:none;font-size:0.82rem">유지보수</a>
        <div class="ri">15초 갱신 | <span id="ut">-</span></div>
    </div>

    <!-- Split View -->
    <div style="display:flex;gap:8px;flex:1;overflow:hidden" id="split-view">
        <div id="hosp-list" style="width:210px;min-width:210px;overflow-y:auto;display:flex;flex-direction:column;gap:3px"></div>
        <div id="hosp-detail" style="flex:1;overflow-y:auto;padding:4px"></div>
    </div>
</div>
<div class="tooltip" id="tip"></div>

<script>
let CF='all', AD=null, insightOpen=false;

function setFilter(f){
    CF=f;
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    const btn=document.querySelector('.fb[data-f="'+f+'"]');
    if(btn)btn.classList.add('on');
    window._selHosp=0;
    if(AD)render(AD);
}
document.querySelectorAll('.fb').forEach(b=>{b.onclick=()=>setFilter(b.dataset.f)});
document.getElementById('sb').oninput=()=>{if(AD){window._selHosp=0;render(AD)}};

function mc(v){return v>=90?'#ff4444':v>=70?'#ffaa00':'#00ff88'}
function gc(p,t){return t==='toner'?(p<=10?'#ff4444':p<=20?'#ffaa00':'#4dd8ff'):(p<=0?'#ff4444':p<=20?'#ffaa00':'#44ffaa')}
function hasW(k){const d=k.printer_detail;if(!d)return false;if((d.toner_black||{}).pct<=20)return true;for(const t of['tray2','tray3'])if((d[t]||{}).pct<=20)return true;return false}
function hasE(k){return['printer_a4','printer_thermal','card_reader','barcode_reader'].some(f=>k[f]==='error')}
function hasCritAlert(k,alerts,hc){return(alerts||[]).some(a=>a.hosp_cd===hc&&a.kiosk_id===k.kiosk_id&&a.severity==='critical')}

function elapsedText(min){
    if(min<0)return{text:'미확인',cls:'ok'};
    if(min<5)return{text:'방금 전',cls:'ok'};
    if(min<60)return{text:min+'분 전',cls:min>30?'warn':'ok'};
    if(min<1440){const h=Math.floor(min/60);return{text:h+'시간 전',cls:'danger'};}
    const d=Math.floor(min/1440);return{text:d+'일 전',cls:'danger'};
}

function toggleInsight(){
    insightOpen=!insightOpen;
    document.getElementById('insight-panel').classList.toggle('show',insightOpen);
}

function prtWarnText(pd){
    if(!pd)return'';
    const warns=[];
    const toner=(pd.toner_black||{}).pct;
    if(toner!==undefined&&toner<=20)warns.push({t:'토너 '+toner+'%',s:toner<=10?'crit':'warn-tag'});
    const t2=(pd.tray2||{}).pct;
    if(t2!==undefined&&t2<=20)warns.push({t:'트레이1 '+t2+'%',s:t2<=0?'crit':'warn-tag'});
    const t3=(pd.tray3||{}).pct;
    if(t3!==undefined&&t3<=20)warns.push({t:'트레이2 '+t3+'%',s:t3<=0?'crit':'warn-tag'});
    return warns;
}

function renderAlertBar(data){
    const bar=document.getElementById('alert-bar');
    const s=data.stats;
    const alerts=data.alerts||[];
    const crit=s.critical_alerts||0;
    const warn=s.warning_alerts||0;

    let h='';
    if(crit>0){
        h+=`<div class="alert-item critical" onclick="setFilter('critical')"><span class="alert-icon">🔴</span><span class="alert-count">${crit}</span> 긴급<span class="alert-detail">즉시 조치 필요</span></div>`;
    }
    if(warn>0){
        h+=`<div class="alert-item warning" onclick="toggleInsight()"><span class="alert-icon">🟡</span><span class="alert-count">${warn}</span> 경고<span class="alert-detail">확인 필요</span></div>`;
    }
    if(s.offline>0){
        h+=`<div class="alert-item critical" onclick="setFilter('offline')"><span class="alert-icon">📡</span> 오프라인 <span class="alert-count">${s.offline}</span>대</div>`;
    }
    if(s.printer_warnings>0){
        h+=`<div class="alert-item warning" onclick="setFilter('warning')"><span class="alert-icon">🖨</span> 프린터경고 <span class="alert-count">${s.printer_warnings}</span>대</div>`;
    }
    if(s.device_errors>0){
        h+=`<div class="alert-item critical" onclick="setFilter('warning')"><span class="alert-icon">⚙</span> 장치오류 <span class="alert-count">${s.device_errors}</span>대</div>`;
    }
    if(crit===0&&warn===0){
        h+=`<div class="alert-item ok"><span class="alert-icon">✅</span> 전체 시스템 정상 운영 중</div>`;
    }
    bar.innerHTML=h;

    // Insight list
    const ilist=document.getElementById('insight-list');
    if(alerts.length===0){
        ilist.innerHTML='<div style="color:#556;font-size:0.78rem;padding:4px">현재 이상 없음</div>';
        return;
    }
    let il='';
    alerts.slice(0,30).forEach(a=>{
        const action=a.type==='offline'?'→ 현장 점검':a.type==='toner_low'?'→ 토너 교체':a.type==='paper_low'?'→ 용지 보충':'→ 장비 점검';
        il+=`<div class="insight-item ${a.severity}" onclick="focusHosp('${a.hosp_cd}')">
            <span>${a.message}</span>
            <span class="insight-action">${action}</span>
        </div>`;
    });
    ilist.innerHTML=il;
}

function focusHosp(hospCd){
    if(!AD)return;
    const hospitals=getFilteredHospitals();
    const idx=hospitals.findIndex(h=>h.hosp_cd===hospCd);
    if(idx>=0){
        window._selHosp=idx;
        render(AD);
        document.querySelectorAll('.hl-item')[idx]?.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
}

function getFilteredHospitals(){
    if(!AD)return[];
    const sq=document.getElementById('sb').value.toLowerCase();
    const alerts=AD.alerts||[];
    return(AD.hospitals||[]).filter(h=>{
        let ks=h.kiosks||[];
        if(CF==='online')ks=ks.filter(k=>k.status==='online');
        else if(CF==='offline')ks=ks.filter(k=>k.status!=='online');
        else if(CF==='warning')ks=ks.filter(k=>hasW(k)||hasE(k));
        else if(CF==='critical')ks=ks.filter(k=>alerts.some(a=>a.hosp_cd===h.hosp_cd&&a.kiosk_id===k.kiosk_id&&a.severity==='critical'));
        if(sq){const m=(h.hosp_name||'').toLowerCase().includes(sq)||(h.hosp_cd||'').includes(sq);if(!m)return false}
        return ks.length>0;
    });
}

function render(data){
    const s=data.stats;
    document.getElementById('o-h').textContent=s.total_hospitals;
    document.getElementById('o-k').textContent=s.total_kiosks;
    document.getElementById('o-on').textContent=s.online;
    document.getElementById('o-off').textContent=s.offline;
    document.getElementById('o-w').textContent=s.printer_warnings;
    document.getElementById('o-e').textContent=s.device_errors||0;
    AD=data;

    renderAlertBar(data);

    const hospitals=getFilteredHospitals();
    const list=document.getElementById('hosp-list');
    let lhtml='';

    // 상단 요약: 필터 결과
    const filteredKiosks=hospitals.reduce((sum,h)=>{
        let ks=h.kiosks||[];
        if(CF==='online')ks=ks.filter(k=>k.status==='online');
        else if(CF==='offline')ks=ks.filter(k=>k.status!=='online');
        else if(CF==='warning')ks=ks.filter(k=>hasW(k)||hasE(k));
        else if(CF==='critical')ks=ks.filter(k=>(data.alerts||[]).some(a=>a.hosp_cd===h.hosp_cd&&a.kiosk_id===k.kiosk_id&&a.severity==='critical'));
        return sum+ks.length;
    },0);
    if(CF!=='all'){
        lhtml+=`<div style="padding:6px 8px;font-size:0.78rem;color:#4fc3f7;background:#0d2a4a;border-radius:4px;margin-bottom:4px;text-align:center">${hospitals.length}개 병원 / ${filteredKiosks}대 키오스크</div>`;
    }

    hospitals.forEach((h,hi)=>{
        let ks=h.kiosks||[];
        if(CF==='online')ks=ks.filter(k=>k.status==='online');
        else if(CF==='offline')ks=ks.filter(k=>k.status!=='online');
        else if(CF==='warning')ks=ks.filter(k=>hasW(k)||hasE(k));
        else if(CF==='critical')ks=ks.filter(k=>(data.alerts||[]).some(a=>a.hosp_cd===h.hosp_cd&&a.kiosk_id===k.kiosk_id&&a.severity==='critical'));

        const onCnt=ks.filter(k=>k.status==='online').length;
        const offCnt=ks.filter(k=>k.status!=='online').length;
        const warnCnt=ks.filter(k=>hasW(k)||hasE(k)).length;
        const sel=window._selHosp===hi?'active':'';

        const hospAlerts=(data.alerts||[]).filter(a=>a.hosp_cd===h.hosp_cd);
        const hasCrit=hospAlerts.some(a=>a.severity==='critical');
        const hasWarnH=hospAlerts.some(a=>a.severity==='warning');
        const sevCls=hasCrit?'has-critical':hasWarnH?'has-warning':'';

        lhtml+=`<div class="hl-item ${sel} ${sevCls}" onclick="selectHosp(${hi})">`;
        lhtml+=`<div class="hl-name">${h.hosp_name||h.hosp_cd}</div>`;
        lhtml+=`<div class="hl-code">${h.hosp_cd} | ${ks.length}대</div>`;
        lhtml+=`<div class="hl-stats">`;
        if(onCnt)lhtml+=`<span class="hl-on">● ${onCnt}</span>`;
        if(offCnt)lhtml+=`<span class="hl-off">● ${offCnt}</span>`;
        if(warnCnt)lhtml+=`<span class="hl-warn">▲ ${warnCnt}</span>`;
        lhtml+=`</div>`;
        if(hasCrit)lhtml+=`<span class="hl-alert-tag crit">긴급 ${hospAlerts.filter(a=>a.severity==='critical').length}건</span>`;
        else if(hasWarnH)lhtml+=`<span class="hl-alert-tag warn">경고 ${hospAlerts.filter(a=>a.severity==='warning').length}건</span>`;
        lhtml+=`</div>`;
    });
    list.innerHTML=lhtml||'<div style="color:#556;padding:10px;font-size:0.82rem">결과 없음</div>';

    if(window._selHosp===undefined)window._selHosp=0;
    renderDetail(data, hospitals);
    document.getElementById('ut').textContent=new Date().toLocaleTimeString('ko-KR');
}

function selectHosp(idx){
    window._selHosp=idx;
    if(AD){
        const hospitals=getFilteredHospitals();
        renderDetail(AD, hospitals);
    }
    document.querySelectorAll('.hl-item').forEach((el,i)=>{
        if(el.classList.contains('hl-item'))el.classList.toggle('active',i===(CF!=='all'?idx+1:idx));
    });
}

function renderDetail(data, hospitals){
    const detail=document.getElementById('hosp-detail');
    if(!hospitals)hospitals=getFilteredHospitals();
    const hi=window._selHosp||0;
    const offset=CF!=='all'?0:0;
    const hosp=hospitals[hi];
    if(!hosp){detail.innerHTML='<div style="color:#556;padding:20px;text-align:center;font-size:0.88rem">병원을 선택하세요</div>';return}

    let ks=hosp.kiosks||[];
    if(CF==='online')ks=ks.filter(k=>k.status==='online');
    else if(CF==='offline')ks=ks.filter(k=>k.status!=='online');
    else if(CF==='warning')ks=ks.filter(k=>hasW(k)||hasE(k));
    else if(CF==='critical')ks=ks.filter(k=>(data.alerts||[]).some(a=>a.hosp_cd===hosp.hosp_cd&&a.kiosk_id===k.kiosk_id&&a.severity==='critical'));

    // 문제 키오스크 상단 정렬
    ks.sort((a,b)=>{
        const sa=(a.status==='error'?2:a.status!=='online'?1:0)+(hasE(a)?2:0)+(hasW(a)?1:0);
        const sb2=(b.status==='error'?2:b.status!=='online'?1:0)+(hasE(b)?2:0)+(hasW(b)?1:0);
        return sb2-sa;
    });

    const hospAlerts=(data.alerts||[]).filter(a=>a.hosp_cd===hosp.hosp_cd);

    let dh=`<div class="detail-title">${hosp.hosp_name||hosp.hosp_cd} <span style="color:#556;font-size:0.78rem">${hosp.hosp_cd} | ${ks.length}대</span>`;
    if(hospAlerts.length>0){
        dh+=` <span style="color:#ff6666;font-size:0.78rem;margin-left:8px">⚠ ${hospAlerts.length}건 이상감지</span>`;
    }
    dh+=`</div>`;

    // 병원별 이상 요약
    if(hospAlerts.length>0){
        dh+=`<div style="background:#1f0a0a;border:1px solid #ff666660;border-radius:8px;padding:12px 16px;margin-bottom:12px;box-shadow:0 0 12px #ff444420">`;
        dh+=`<div style="font-size:0.92rem;color:#ff9999;margin-bottom:8px;font-weight:bold">⚠ 이 병원의 이상 현황</div>`;
        hospAlerts.forEach(a=>{
            const action=a.type==='offline'?'현장 점검 필요':a.type==='toner_low'?'토너 교체 필요':a.type==='paper_low'?'용지 보충 필요':'장비 점검 필요';
            const c=a.severity==='critical'?'#ff8888':'#ffdd66';
            dh+=`<div style="font-size:0.85rem;color:${c};padding:3px 0;line-height:1.5">• ${a.message} → <span style="color:#4fc3f7">${action}</span></div>`;
        });
        dh+=`</div>`;
    }

    dh+=`<div class="detail-grid">`;

    ks.forEach(k=>{
        const st=k.status||'offline';
        const cls=st==='online'?'on':st==='error'?'err':'off';
        const stCls=st==='online'?'dk-st-on':st==='error'?'dk-st-err':'dk-st-off';
        const stTxt=st==='online'?'온라인':st==='error'?'오류':'오프라인';
        const p=k.pc||{};
        const pd=k.printer_detail;
        const kioskAlerts=(data.alerts||[]).filter(a=>a.hosp_cd===hosp.hosp_cd&&a.kiosk_id===k.kiosk_id);
        const hasAlert=kioskAlerts.length>0;
        const el=elapsedText(k.elapsed_min!=null?k.elapsed_min:-1);

        dh+=`<div class="dk-card ${cls} ${hasAlert?'has-alert':''}">`;
        dh+=`<div class="dk-header"><span class="dk-id">${k.kiosk_id}</span><span class="dk-status ${stCls}">${stTxt}</span></div>`;
        dh+=`<div class="dk-elapsed ${el.cls}">마지막 통신: ${el.text}</div>`;

        // PC
        dh+=`<div class="dk-section"><div class="dk-section-title">PC 상태</div><div class="dk-bars">`;
        [{l:'CPU',v:p.cpu||0},{l:'MEM',v:p.memory||0},{l:'DISK',v:p.disk||0}].forEach(b=>{
            dh+=`<div class="dk-bar-item"><span class="dk-bar-label">${b.l}</span><div class="dk-bar"><div class="dk-bar-fill" style="width:${b.v}%;background:${mc(b.v)}"></div></div><span class="dk-bar-val">${Math.round(b.v)}%</span></div>`;
        });
        dh+=`</div></div>`;

        // Devices
        dh+=`<div class="dk-section"><div class="dk-section-title">장치</div><div class="dk-devs">`;
        [{n:'A4프린터',s:k.printer_a4},{n:'영수증',s:k.printer_thermal},{n:'카드리더',s:k.card_reader},{n:'바코드',s:k.barcode_reader}].forEach(d=>{
            const dc=d.s==='ok'?'#00ff88':d.s==='error'?'#ff4444':d.s==='warning'?'#ffaa00':'#555';
            dh+=`<div class="dk-dev"><div class="dk-dev-dot" style="background:${dc}"></div>${d.n}</div>`;
        });
        dh+=`</div></div>`;

        // Printer (토너, 트레이1=tray2, 트레이2=tray3) - MP카세트 제외
        if(pd){
            const tb=pd.toner_black||{};
            const t2=pd.tray2||{};
            const t3=pd.tray3||{};
            dh+=`<div class="dk-prt"><div class="dk-prt-title">${pd.model||'프린터'} <span style="color:#556;font-size:0.65rem">S/N: ${pd.serial||'-'}</span></div>`;
            dh+=`<div class="dk-prt-bars">`;
            [{l:'토너',p:tb.pct||0,t:'toner'},{l:'트레이1',p:t2.pct||0,t:'paper'},{l:'트레이2',p:t3.pct||0,t:'paper'}].forEach(g=>{
                dh+=`<div class="dk-prt-item"><span class="dk-prt-label">${g.l}</span><div class="dk-prt-bar"><div class="dk-prt-fill" style="width:${g.p}%;background:${gc(g.p,g.t)}"></div><span class="dk-prt-pct">${g.p}%</span></div></div>`;
            });
            dh+=`</div>`;
            // 프린터 경고 태그
            const pWarns=prtWarnText(pd);
            if(pWarns.length>0){
                dh+=`<div style="margin-top:4px">`;
                pWarns.forEach(w=>{dh+=`<span class="dk-prt-warn ${w.s}">${w.t}</span> `;});
                dh+=`</div>`;
            }
            dh+=`<div class="dk-print-stats"><span style="color:#ff88aa">오늘 ${k.today_print||0}매</span><span style="color:#aa88ff">7일avg ${k.avg7_print||0}매</span><span style="color:#778">누적 ${(pd.page_count||0).toLocaleString()}매</span></div>`;
            dh+=`</div>`;
        } else {
            dh+=`<div class="dk-prt"><div style="color:#889;font-size:0.82rem;padding:6px;background:#12122a;border:1px dashed #334;border-radius:4px">🖨 프린터 데이터 수집 대기 중...</div></div>`;
        }

        // 원격제어
        const tvId = k.teamviewer_id || '';
        if(tvId){
            dh+=`<div class="dk-remote">
                <a class="dk-remote-btn tv" href="teamviewer10://control?device=${tvId}" title="TeamViewer로 원격 접속">🖥 원격제어</a>
                <span class="dk-remote-id">TV ID: ${tvId}</span>
            </div>`;
        } else {
            dh+=`<div class="dk-remote">
                <span class="dk-remote-btn disabled">🖥 원격제어</span>
                <span class="dk-remote-id">TeamViewer ID 미등록</span>
            </div>`;
        }

        // 키오스크별 이상 표시
        if(kioskAlerts.length>0){
            dh+=`<div style="margin-top:6px;padding-top:6px;border-top:1px solid #2a2a4e">`;
            kioskAlerts.forEach(a=>{
                const c=a.severity==='critical'?'#ff8888':'#ffdd66';
                const action=a.type==='offline'?'현장 점검':a.type==='toner_low'?'토너 교체':a.type==='paper_low'?'용지 보충':'장비 점검';
                dh+=`<div style="font-size:0.8rem;color:${c};animation:blink-alert 1.5s infinite">⚠ ${a.message} → <span style="color:#4fc3f7">${action}</span></div>`;
            });
            dh+=`</div>`;
        }

        dh+=`</div>`;
    });
    dh+=`</div>`;
    detail.innerHTML=dh;
}

function load(){
    fetch('/api/kiosk-monitor').then(r=>r.json()).then(d=>{AD=d;render(d)}).catch(()=>{});
}
load();setInterval(load,15000);

// Clock
function tick(){const d=new Date();const el=document.getElementById('clk');if(el)el.textContent=d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+d.toLocaleTimeString('ko-KR');}
setInterval(tick,1000);tick();
</script>
