<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새 티켓 - BSEYE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#eee;font-family:'Segoe UI',sans-serif}
.header{background:#12122a;padding:10px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #333}
.header .title{color:#00d4ff;font-weight:bold;font-size:1.1rem}
.header a{color:#888;text-decoration:none;font-size:0.85rem}
.header a:hover{color:#00d4ff}
.container{max-width:600px;margin:30px auto;padding:0 16px}
.form-card{background:#12122a;border:1px solid #333;border-radius:8px;padding:24px}
.form-card h2{color:#00d4ff;font-size:1rem;margin-bottom:20px}
label{display:block;color:#888;font-size:0.8rem;margin-bottom:4px;margin-top:14px}
input,select,textarea{width:100%;padding:8px 12px;background:#1a1a3e;border:1px solid #444;border-radius:6px;color:#eee;font-size:0.85rem}
input:focus,select:focus,textarea:focus{border-color:#00d4ff;outline:none}
textarea{height:120px;resize:vertical}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-submit{padding:10px 24px;background:#00d4ff;color:#000;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:0.9rem}
.btn-submit:hover{background:#00b8d9}
.btn-cancel{padding:10px 24px;background:#333;color:#ccc;border:1px solid #555;border-radius:6px;cursor:pointer;font-size:0.9rem;text-decoration:none;text-align:center}
@media(max-width:768px){
    .header{padding:6px 10px!important;height:auto!important}
    .header>div:last-child{display:none!important}
    .container{padding:0 8px;margin:10px auto}
    .form-card{padding:16px}
    .form-card h2{font-size:0.92rem;margin-bottom:16px}
    label{font-size:0.78rem;margin-top:12px}
    input,select,textarea{padding:10px 12px;font-size:0.85rem;min-height:42px}
    textarea{height:100px}
    .btn-row{flex-direction:column;gap:8px}
    .btn-submit,.btn-cancel{width:100%;min-height:44px;font-size:0.85rem;text-align:center}
}
</style>
</head>
<body style="padding-top:60px">
<div class="header" style="position:fixed;top:0;left:0;right:0;z-index:1000;background:#111130;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333;height:48px;">
    <span style="font-size:1.26rem;font-weight:700;color:#eee;white-space:nowrap"><em style="color:#00d4ff;font-style:normal">BS</em>EYE <span style="font-size:0.82rem;font-weight:400;color:#a0b0c0;margin-left:6px">티켓등록</span></span>
    {% include 'nav.html' %}
    <div style="display:flex;gap:10px;align-items:center">
        <span style="color:#aaa;font-size:0.78rem;white-space:nowrap">{{ session.get('user_name', '') }}</span>
        <a href="/change-password" style="color:#aaa;text-decoration:none;font-size:0.72rem">비밀번호</a>
        <a href="/logout" style="color:#ff6b6b;text-decoration:none;font-size:0.72rem">로그아웃</a>
    </div>
</div>


</body>
</html>
