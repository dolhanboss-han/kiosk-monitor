; ============================================
; BSEYE Agent - 서버PC 설정 예시
; ============================================
; 서버PC에서는 프린터/바코드/모니터 체크를 건너뛰고
; 프로세스 실행 여부 + DB 연결 상태만 체크합니다.

[KIOSK_INFO]
; device_type: server로 설정
device_type = server
category = standard
monitor_size = 0
usage_type = server

[MONITOR_SETTING]
target_process =
exclude_process =
exclude_title =
retention_days = 30
web_port = 8080

[SERVER]
; 모니터링 서버 URL
server_url = https://monitor.blueswell.co.kr/api/agent/heartbeat
usage_url = https://monitor.blueswell.co.kr/api/agent/events
agent_token = bseye-agent-2026
; 병원코드
hosp_cd = H001
; 서버 ID (병원 내 고유)
kiosk_id = SVR01
kiosk_name = 번호발급서버
send_interval = 60
heartbeat_interval = 30

[DEVICE_CHECK]
; 서버PC는 PC 체크만 활성화 (나머지는 device_type=server에 의해 스킵)
pc = true
monitor = false
printer_a4 = false
printer_thermal = false
card_reader = false
barcode_scanner = false

[PRINTER_A4]
ip =
snmp_community = public

[PRINTER_THERMAL]
dll_path =
model =

[CARD_READER]
device_keyword =

[BARCODE_SCANNER]
device_keyword =

[VAN_AGENT]
process =

[NETWORK]
emr_host = 127.0.0.1
emr_port = 7000

[SERVER_MONITOR]
; 감시할 프로세스 목록 (쉼표 구분)
process_list = bs_number.exe
; DB 연결 체크 설정
db_type = mssql
db_host = localhost
db_port = 1433
; DB 포트 TCP 연결 체크 on/off
db_check = true
