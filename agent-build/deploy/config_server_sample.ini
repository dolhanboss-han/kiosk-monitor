; ============================================
; BSEYE Agent - Server PC Configuration Sample
; ============================================
; Server PC skips printer/barcode/monitor checks.
; Only process status + DB connection are monitored.

[KIOSK_INFO]
; device_type: set to server
device_type = server
category = standard
monitor_size = 0
usage_type = server

[MONITOR_SETTING]
target_process =
exclude_process =
exclude_title =
retention_days = 30
web_port = 8080

[SERVER]
; monitoring server URL
server_url = https://monitor.blueswell.co.kr/api/agent/heartbeat
usage_url = https://monitor.blueswell.co.kr/api/agent/events
agent_token = bseye-agent-2026
; hospital code
hosp_cd = H001
; server ID (unique per hospital)
kiosk_id = SVR01
kiosk_name = Number Server
send_interval = 60
heartbeat_interval = 30

[DEVICE_CHECK]
; server PC: only PC check enabled (others skipped by device_type=server)
pc = true
monitor = false
printer_a4 = false
printer_thermal = false
card_reader = false
barcode_scanner = false

[PRINTER_A4]
ip =
snmp_community = public

[PRINTER_THERMAL]
dll_path =
model =

[CARD_READER]
device_keyword =

[BARCODE_SCANNER]
device_keyword =

[VAN_AGENT]
process =

[NETWORK]
emr_host = 127.0.0.1
emr_port = 7000
emr_check_type = tcp
emr_log_path =
emr_success_keyword = OCS/EMR

[SERVER_MONITOR]
; processes to monitor (comma separated)
process_list = bs_number.exe
; DB connection check settings
db_type = mssql
db_host = localhost
db_port = 1433
; DB port TCP check on/off
db_check = true
