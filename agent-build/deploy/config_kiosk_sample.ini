; ============================================
; BSEYE Agent - 키오스크 설정 예시
; ============================================

[KIOSK_INFO]
; device_type: kiosk (키오스크) / server (서버PC)
device_type = kiosk
; category: standard(일반), premium(프리미엄)
category = standard
; monitor_size: 모니터 크기 (인치)
monitor_size = 27
; usage_type: receipt(접수), payment(수납), certificate(제증명)
usage_type = receipt

[MONITOR_SETTING]
; 키오스크 프로그램 프로세스명
target_process = kiosk_msys.exe
exclude_process =
exclude_title =
; 로그 보관 일수
retention_days = 30
; 웹 모니터링 포트
web_port = 8080

[SERVER]
; 모니터링 서버 URL
server_url = https://monitor.blueswell.co.kr/api/agent/heartbeat
usage_url = https://monitor.blueswell.co.kr/api/agent/events
; 에이전트 인증 토큰
agent_token = bseye-agent-2026
; 병원코드
hosp_cd = H001
; 키오스크 ID (병원 내 고유)
kiosk_id = KIOSK01
; 키오스크 이름 (표시용)
kiosk_name = 1층 접수
; heartbeat 전송 간격 (초)
send_interval = 60
heartbeat_interval = 30

[DEVICE_CHECK]
; 각 장치 체크 on/off
pc = true
monitor = true
printer_a4 = true
printer_thermal = true
card_reader = false
barcode_scanner = true

[PRINTER_A4]
; A4 프린터 IP (SNMP)
ip = 192.168.0.25
snmp_community = public

[PRINTER_THERMAL]
; 감열 프린터 DLL 경로
dll_path = C:\Windows\SysWOW64\HwaUSB.DLL
; 프린터 모델명
model = HMK-072

[CARD_READER]
; 카드리더기 USB 장치 키워드
device_keyword = card,reader,smart

[BARCODE_SCANNER]
; 바코드 스캐너 USB 장치 키워드
device_keyword = barcode,POS HID,0C2E

[VAN_AGENT]
; VAN 에이전트 프로세스명
process = KocesICPos.exe

[NETWORK]
; EMR 연결 체크
emr_host = 127.0.0.1
emr_port = 7000

[SERVER_MONITOR]
; 서버PC 전용 설정 (device_type = kiosk일 때 무시됨)
process_list = bs_number.exe
db_type = mssql
db_host = localhost
db_port = 1433
db_check = true
