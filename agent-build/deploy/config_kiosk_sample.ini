; ============================================
; BSEYE Agent - Kiosk Configuration Sample
; ============================================

[KIOSK_INFO]
; device_type: kiosk / server
device_type = kiosk
; category: standard / premium
category = standard
; monitor_size: monitor size in inches
monitor_size = 27
; usage_type: receipt / payment / certificate
usage_type = receipt

[MONITOR_SETTING]
; kiosk application process name
target_process = kiosk_msys.exe
exclude_process =
exclude_title =
; log retention days
retention_days = 30
; local web monitoring port
web_port = 8080

[SERVER]
; monitoring server URL
server_url = https://monitor.blueswell.co.kr/api/agent/heartbeat
usage_url = https://monitor.blueswell.co.kr/api/agent/events
; agent auth token
agent_token = bseye-agent-2026
; hospital code
hosp_cd = H001
; kiosk ID (unique per hospital)
kiosk_id = KIOSK01
; kiosk display name
kiosk_name = Lobby Kiosk
; heartbeat send interval (seconds)
send_interval = 60
heartbeat_interval = 30

[DEVICE_CHECK]
; enable/disable each device check
pc = true
monitor = true
printer_a4 = true
printer_thermal = true
card_reader = false
barcode_scanner = true

[PRINTER_A4]
; A4 printer IP (SNMP)
ip = 192.168.0.25
snmp_community = public

[PRINTER_THERMAL]
; thermal printer DLL path
dll_path = C:\Windows\SysWOW64\HwaUSB.DLL
; printer model name
model = HMK-072

[CARD_READER]
; card reader USB device keyword
device_keyword = card,reader,smart

[BARCODE_SCANNER]
; barcode scanner USB device keyword
device_keyword = barcode,POS HID,0C2E

[VAN_AGENT]
; VAN agent process name
process = KocesICPos.exe

[NETWORK]
; EMR connection check
emr_host = 127.0.0.1
emr_port = 7000
emr_check_type = log_file
emr_log_path = C:\MsystechHIS_Ver.2\KIOSK_NSS\LOG
emr_success_keyword = OCS/EMR

[SERVER_MONITOR]
; server PC only (ignored when device_type = kiosk)
process_list = bs_number.exe
db_type = mssql
db_host = localhost
db_port = 1433
db_check = true
